body: |-
  #### US-022: Resource anagrafiche con gestione alias (brand, famiglia, sottofamiglia)

  **Epica:** EP-007 | **Priorità:** MEDIUM | **Punti:** 3 | **Stato:** TODO
  **Bloccata da:** -

  **User Story**
  Come amministratore del catalogo,
  voglio gestire brands, famiglie e sottofamiglie dal backoffice Filament, inclusi gli alias di ogni marca,
  così da migliorare il riconoscimento automatico della marca senza modificare il codice sorgente.

  **Dimostra**
  Dopo aver implementato questa spec, l'amministratore può aggiungere 'VAILL' come alias di 'VAILLANT' dal backoffice; al prossimo arricchimento deterministico, le descrizioni contenenti 'VAILL' vengono correttamente risolte a VAILLANT.

  **Criteri di Accettazione**
  - [ ] `BrandResource` permette CRUD su brands con campo `aliases` editabile come lista di stringhe
  - [ ] `FamilyResource` e `SubfamilyResource` permettono CRUD sulle anagrafiche
  - [ ] Gli alias vengono caricati e usati dal BrandResolver nella fase deterministica
  - [ ] Non è possibile salvare un alias già associato a un'altra marca (unicità degli alias)
