  #### US-045: Persistenza di product_type pulito

  **Epica:** EP-009 | **PrioritĂ :** HIGH | **Punti:** 2 | **Stato:** TODO
  **Bloccata da:** -

  **User Story**
  Come gestore del catalogo,
  voglio che il tipo prodotto giĂ  restituito dall'AI venga salvato su `products` come nome pulito del tipo,
  cosĂŹ da avere una base testuale affidabile per embedding e ricerca.

  **Dimostra**
  Dopo una classificazione, il prodotto ha `product_type` valorizzato (es. "Caldaia a condensazione"), senza marca nĂ© valori di attributi.

  **Criteri di Accettazione**
  - [ ] Colonna `product_type` su `products`, popolata da `EnrichmentApplier` secondo le stesse fasce di confidenza degli altri campi AI
  - [ ] Istruzione di prompt ristretta: `product_type` contiene solo il nome/tipo del prodotto, esplicitamente senza marca, famiglia, sottofamiglia o valori di attributi
  - [ ] `enriched_description` resta invariata (continua a vivere solo nel log di arricchimento)
  - [ ] Una riclassificazione aggiorna il valore esistente

  **Assunzioni**
  - Si riusa il campo `product_type` giĂ  presente nel contratto AI (`ClassifiedProduct`/`ClassificationResponseValidator`): nessun campo nuovo nel contratto.
