schema: archetipo/plan/v2
spec_code: US-012
body: |
  # US-012: Propagazione famiglia/sottofamiglia nel product_base — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-02

  ---

  ## Spec

  **Epic:** EP-003 — Arricchimento Deterministico
  **Priority:** MEDIUM | **Points:** 2
  **Blocked by:** US-011 (REVIEW — GroupingResolver already implemented, unblocking this spec)

  **User Story**
  Come amministratore del catalogo, voglio che la famiglia e la sottofamiglia vengano propagate automaticamente alle varianti prive di classificazione all'interno dello stesso product_base, così da aumentare la copertura della tassonomia prima di richiedere l'intervento dell'AI.

  **Acceptance Criteria**
  - Varianti senza `family_id` all'interno di un product_base ricevono il `family_id` prevalente nel gruppo
  - Le varianti aggiornate hanno `family_source='propagated'`
  - La propagazione non sovrascrive valori con `family_source='file'`, `'ai'` o `'manual'`
  - Il job è idempotente: rieseguirlo non altera varianti già classificate

  ---

  ## Technical Solution

  Introduciamo `App\Services\Enrichment\FamilyPropagationResolver`, che segue lo stesso pattern architetturale dei resolver EP-003 già esistenti (`BrandResolver`, `GroupingResolver`), ma opera per **gruppo** (`ProductBase`) invece che per singolo `Product`, perché la propagazione richiede di guardare tutte le varianti sorelle per determinare il valore prevalente. La spec si innesta subito dopo `GroupingResolver` (US-011, REVIEW): richiede che le varianti abbiano già un `product_base_id` assegnato, altrimenti non c'è gruppo su cui calcolare la prevalenza.

  - **Firma pubblica:** `resolve(ProductBase $productBase): int`, ritorna il numero di varianti aggiornate (0 se nessuna propagazione necessaria/possibile), coerente con lo stile booleano/numerico di ritorno già usato dagli altri resolver per riportare l'esito al chiamante senza side-channel.
  - **Calcolo del valore prevalente:** carica tutte le `products` del `productBase` (`$productBase->products`), raggruppa per `family_id` non-null e conta le occorrenze; il valore con il conteggio più alto vince. In caso di parità, si sceglie il `family_id` più basso (tie-break deterministico, necessario per l'idempotenza e la prevedibilità dei test — nessuna ambiguità run-to-run). Stessa identica logica, indipendente, per `subfamily_id`.
  - **Guardia "nessuna maggioranza":** se **nessuna** variante del gruppo ha `family_id` valorizzato, non c'è nulla da propagare: il metodo non tocca alcuna riga per quel campo (ritorna 0 aggiornamenti per family). Idem per subfamily. Le due propagazioni (family/subfamily) sono indipendenti tra loro: un gruppo può propagare la family ma non la subfamily se solo la subfamily è priva di maggioranza.
  - **Guardia sovrascrittura:** vengono aggiornate **solo** le varianti con `family_id === null` (rispettivamente `subfamily_id === null`). Questo garantisce per costruzione che `family_source` in `'file'|'ai'|'manual'` non venga mai toccato: se una variante ha già un `family_id` (da qualunque source, incluso `'propagated'` di un run precedente), il resolver non la considera candidata alla scrittura — stesso principio di guardia-su-colonna-già-valorizzata di `BrandResolver`/`GroupingResolver`, applicato qui a livello di singola colonna invece che a livello di intero record.
  - **Scrittura:** per ogni variante candidata (family_id null) del gruppo, `$product->fill(['family_id' => $prevailingFamilyId, 'family_source' => 'propagated'])->save()`; stesso schema indipendente per subfamily. Usare un batch update (`Product::query()->whereIn('id', $candidateIds)->update([...])`) invece di un save() per riga, per efficienza su gruppi potenzialmente ampi e per coerenza con lo stile a chunk/batch già visto in `PromoteStagingToProductsJob`; non altera `updated_at` in modo problematico perché il progetto non ha vincoli di audit puntuale su questa colonna per i resolver (gli altri resolver usano già `save()` per riga, ma qui il volume per gruppo giustifica l'update singolo — nessuna differenza semantica osservabile nei test).
  - **Idempotenza:** rieseguire `resolve()` sullo stesso `ProductBase` dopo una prima propagazione non altera le varianti già aggiornate, perché il loro `family_id`/`subfamily_id` non è più null e quindi non sono più candidate. Le varianti con source `'file'|'ai'|'manual'` restano intoccate per lo stesso motivo strutturale (guardia su valore null, non su source), quindi la guardia "non sovrascrivere `file`/`ai`/`manual`" è automaticamente soddisfatta senza bisogno di leggere esplicitamente `family_source`.
  - **Nessuna nuova colonna/migrazione:** `family_id`, `subfamily_id`, `family_source`, `subfamily_source` esistono già su `products` (migrazione US-002/US-003 area); il valore `'propagated'` è solo un nuovo valore di stringa libera per `family_source`/`subfamily_source`, coerente con l'assenza di enum per questi campi (già osservato in `BrandResolver`/`EnrichmentApplier`).
  - **Invocazione:** il resolver è un servizio testabile in isolamento, invocato direttamente (nessun job/comando dedicato in questa spec, stesso scope minimale di US-011 che si è fermato al solo `GroupingResolver`); la sua orchestrazione all'interno di una pipeline end-to-end è fuori scope e resta apertura per una spec successiva di orchestrazione, se necessaria.

  ---

  ## Test Strategy

  Feature test `FamilyPropagationResolverTest` (RefreshDatabase + RequiresDatabase, stesso pattern di `GroupingResolverTest`/`BrandResolverTest`), in sqlite in-memory.

  - Demo esplicita della spec: un `product_base` con 4 varianti, 3 con lo stesso `family_id` valorizzato e 1 con `family_id` null → dopo `resolve()`, la quarta variante riceve il `family_id` prevalente e `family_source = 'propagated'`.
  - La propagazione non sovrascrive una variante con `family_source = 'file'` (o `'ai'`, o `'manual'`) anche se il suo `family_id` differisce dal valore prevalente del gruppo — verificato lasciando `family_id` valorizzato (non null) su quella variante e controllando che resti invariato dopo `resolve()`.
  - Idempotenza: rieseguire `resolve()` due volte sullo stesso `product_base` produce lo stesso stato finale al secondo giro (0 varianti aggiornate al secondo run, nessuna eccezione, nessun cambio di `family_id`/`family_source` sulle varianti già propagate).
  - Nessuna maggioranza: un gruppo in cui nessuna variante ha `family_id` valorizzato non produce alcuna scrittura (0 varianti aggiornate, tutte restano null).
  - Parità di conteggio: un gruppo con conteggi pari tra due `family_id` distinti sceglie in modo deterministico (id più basso) — stesso risultato a ogni esecuzione.
  - Subfamily indipendente da family: un gruppo dove solo la subfamily ha maggioranza (family non ha maggioranza, o è già tutta valorizzata/nulla in modo non decidibile) propaga correttamente la sola subfamily, lasciando la family invariata.

  Nessun lavoro UI: la spec è puramente di dominio/backend, non è richiesta strategia e2e né mockup.

  ---

