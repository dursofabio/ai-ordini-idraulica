    description: 'tests/Browser/ReviewQueueDetailPageTest.php: l''admin apre ''Da revisionare'', clicca ''Dettagli'' su una riga (navigazione reale verso /admin/review-queue/{id}, non modale), vede tutte le informazioni del prodotto incluso un attributo tecnico, corregge marca/famiglia/sottofamiglia e il valore dell''attributo, salva, viene reindirizzato alla coda dove il prodotto (ora enriched/manuale) non Ă¨ piĂą presente. Screenshot per-step salvati in docs/test-results/US-038/ (Dusk non supporta video nativamente, stessa convenzione di US-023).'
