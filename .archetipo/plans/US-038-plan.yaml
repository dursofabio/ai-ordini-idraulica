    description: 'Estendere tests/Feature/ReviewQueueTest.php: verificare che ogni riga esponga l''azione/link viewDetail con URL risolto verso ReviewQueueDetail::getUrl([''record'' => $product]), e che l''azione ''correct'' esistente in tabella resti invariata e funzionante (non-regressione AC5).'
