schema: archetipo/plan/v2
spec_code: US-017
body: |
  # US-017: Client embedding self-hosted (Ollama + bge-m3) configurabile — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-01

  ---

  ## Spec

  **Epic:** EP-005 — Embedding Vettoriale
  **Priority:** HIGH | **Points:** 2

  **User Story**
  Come sviluppatore del team, voglio un client HTTP per il provider di embedding configurato tramite variabili d'ambiente, così da poter vettorizzare le descrizioni dei prodotti-base in modo uniforme e sostituibile senza modificare il codice applicativo.

  > **Nota di decisione di progetto:** il titolo storico della spec cita "Voyage AI", ma la direzione è stata cambiata: il provider di riferimento è ora **self-hosted Ollama + modello `bge-m3`** (multilingua, buono sull'italiano, vettori a 1024 dimensioni — coerente con la colonna `vector(1024)` già creata in US-016 per `product_embeddings`), per evitare un costo API ricorrente. Voyage AI, OpenAI `text-embedding-3-small` e Cohere `embed-v3` sono stati valutati e scartati per lo stesso motivo. Il client resta comunque **provider-agnostic**: endpoint/modello/chiave letti da config, quindi cambiare provider in futuro è una modifica di configurazione, non di codice.

  **Acceptance Criteria**
  - Il client legge endpoint, modello e chiave da `config('services.embedding.*')`
  - Il client restituisce un array di float con dimensione `EMBEDDING_DIM` coerente con la colonna `vector(1024)` di `product_embeddings`
  - Un test con mock HTTP verifica il comportamento su risposta valida e su errore del provider
  - Il client è iniettabile tramite dependency injection per facilitare i test
  - (Decisione di progetto) Le chiamate di embedding sono eseguite in coda (job/Horizon), non in modo sincrono, perché l'inferenza locale via Ollama su CPU è più lenta di una API cloud

  ---

  ## Technical Solution

  Introduciamo `App\Services\Ai\EmbeddingClient`, stessa cartella `App\Services\Ai` di `ClaudeClient` (US-013) e stesso pattern architetturale: thin wrapper su `Http::` di Laravel, nessuna chiave/modello hardcodato, tutto da `config('services.embedding.*')`. In aggiunta, poiché l'inferenza locale su Ollama è più lenta di una chiamata a un'API cloud, la generazione dell'embedding per un prodotto viene incapsulata in un job in coda (`ShouldQueue`), seguendo lo stesso schema di `ClassifyProductsBatchJob` (US-014) con `onQueue('embeddings')` dedicata, così Horizon può bilanciare/scalare i worker di embedding indipendentemente da quelli di classificazione AI.

  - **Configurazione (`config/services.php`):** nuovo blocco `'embedding' => ['base_url' => env('EMBEDDING_BASE_URL', 'http://localhost:11434'), 'model' => env('EMBEDDING_MODEL', 'bge-m3'), 'api_key' => env('EMBEDDING_API_KEY'), 'dimensions' => env('EMBEDDING_DIM', 1024), 'timeout' => env('EMBEDDING_TIMEOUT', 120), 'retry_times' => env('EMBEDDING_RETRY_TIMES', 2), 'retry_delay_ms' => env('EMBEDDING_RETRY_DELAY_MS', 2000)]`. Il default `base_url` punta all'endpoint locale standard di Ollama (`http://localhost:11434`, sovrascrivibile in produzione con l'host del servizio Ollama containerizzato). `api_key` resta supportato (nullable, header `Authorization` aggiunto solo se valorizzato) per restare compatibile con provider futuri che lo richiedono (OpenAI-style), pur non essendo necessario per Ollama self-hosted. Aggiungere le stesse chiavi (vuote/con default sensato) a `.env.example`, seguendo lo stile del blocco `ANTHROPIC_*` già presente.
  - **`EmbeddingClient::embed(string $text): array`:** costruisce la richiesta con un metodo privato `pendingRequest()` (header `content-type: application/json` + `Authorization: Bearer ...` solo se `api_key` è configurata, `baseUrl`, `timeout`, `retry`) e fa `POST /api/embeddings` con payload `['model' => config('services.embedding.model'), 'prompt' => $text]` (formato nativo dell'endpoint Ollama `/api/embeddings`). La risposta Ollama ha forma `{"embedding": [0.1, 0.2, ...]}`; il metodo estrae e restituisce direttamente `array<int, float>`, validando che la lunghezza corrisponda a `config('services.embedding.dimensions')` e lanciando una `RuntimeException` esplicita se il provider restituisce una dimensione diversa (mismatch modello/config, da intercettare subito invece di scrivere un vettore incoerente su `product_embeddings.embedding vector(1024)`).
  - **Gestione errori:** su risposta 4xx/5xx dopo i retry configurati, il client lascia propagare `Illuminate\Http\Client\RequestException` (stesso comportamento di `ClaudeClient`), senza swallowing silenzioso; il job chiamante decide se fare retry/log.
  - **`App\Jobs\GenerateProductEmbeddingJob`:** nuovo job `ShouldQueue` (`Dispatchable`, `InteractsWithQueue`, `Queueable`, `SerializesModels`), `onQueue('embeddings')`, che riceve un `productId`, costruisce il testo da vettorizzare (descrizione arricchita del prodotto, riusando i campi già scritti da `EnrichmentApplier` in US-015 quando disponibili, altrimenti la descrizione grezza), chiama `EmbeddingClient::embed()` iniettato via method injection in `handle()`, e fa un `updateOrCreate` su `ProductEmbedding` (chiave `product_id` + `model`, già garantita `unique` dalla migration di US-016) con `content`, `model`, `dimensions`, `embedding`. Questo copre esplicitamente il criterio "chiamate in coda, non sincrone".
  - **Horizon:** nessuna modifica strutturale a `config/horizon.php` richiesta in questa spec (la coda `embeddings` viene già instradata dal supervisor di default); si valuterà un supervisor dedicato con `maxProcesses` ridotto in una spec successiva se il volume lo richiede, per non sovraccaricare l'istanza Ollama locale con troppe richieste concorrenti.

  ---

  ## Test Strategy

  Feature test `EmbeddingClientTest` basato su `Http::fake()` (nessuna chiamata di rete reale verso Ollama), stessa filosofia di `ClaudeClientTest`.

  - Una chiamata a `embed()` invia una richiesta a `/api/embeddings` con il payload `{model, prompt}` corretto e, se configurata, l'header `Authorization` (asserto con `Http::assertSent`); se `api_key` è vuota, l'header `Authorization` non deve essere presente.
  - Una risposta valida stub (`{"embedding": [...]}` con esattamente 1024 valori float) viene restituita da `embed()` come `array<int, float>` di lunghezza 1024.
  - Una risposta valida ma con dimensione diversa da `config('services.embedding.dimensions')` fa lanciare una `RuntimeException` esplicita, senza restituire un vettore incoerente.
  - Una risposta HTTP 4xx/5xx (`Http::fake` con status di errore) fa lanciare `RequestException` dal client dopo i retry configurati (`Http::assertSentCount` per verificare il numero di tentativi).
  - Nessuna chiave o modello è mai hardcodato: verificato tramite gli assert sugli header/payload che leggono da `config('services.embedding.*')` impostato nel `setUp()` del test.
  - Feature test `GenerateProductEmbeddingJobTest` (con `Queue::fake()` per un test di dispatch e un test separato con `Http::fake()` + esecuzione sincrona del job per il comportamento end-to-end) che verifica: il job gira sulla coda `embeddings`; a fronte di una risposta embedding valida crea/aggiorna la riga `ProductEmbedding` corretta (`product_id`, `model`, `dimensions`, `embedding`); il job non fallisce silenziosamente se `EmbeddingClient` lancia un'eccezione (la eccezione propaga per permettere il retry standard della coda).

  Nessun lavoro UI: la spec è puramente infrastrutturale/backend (client HTTP + job in coda), non è richiesta strategia e2e né mockup.

  ---

  _Plan generated via ARchetipo Planning — 2026-07-01_
tasks:
  - id: TASK-01
    title: Configurazione services.embedding e .env.example
    description: Aggiungere il blocco 'embedding' a config/services.php con base_url (default Ollama http://localhost:11434), model (default 'bge-m3'), api_key, dimensions (default 1024), timeout, retry_times, retry_delay_ms letti da env(). Documentare le stesse variabili in .env.example seguendo lo stile del blocco ANTHROPIC_*.
    type: Impl
    status: TODO
  - id: TASK-02
    title: 'EmbeddingClient: pendingRequest() con header opzionale, timeout e retry'
    description: 'Creare App\Services\Ai\EmbeddingClient con un metodo privato pendingRequest() che configura content-type: application/json, header Authorization solo se api_key è valorizzata, baseUrl, timeout e retry, tutto letto da config(''services.embedding.*''). Nessuna chiave o modello hardcodato.'
    type: Impl
    status: TODO
    dependencies:
      - TASK-01
  - id: TASK-03
    title: 'Test: header e payload della richiesta embed()'
    description: Feature test EmbeddingClientTest con Http::fake() che verifica che embed() invii POST a /api/embeddings con payload {model, prompt} corretto (valori da config) e che l'header Authorization sia presente solo quando api_key è configurata.
    type: Test
    status: TODO
    dependencies:
      - TASK-02
  - id: TASK-04
    title: EmbeddingClient::embed() con parsing e validazione dimensione vettore
    description: 'Implementare il metodo pubblico embed(string $text): array che esegue la richiesta tramite pendingRequest(), estrae il campo ''embedding'' dalla risposta Ollama e restituisce un array<int, float>, lanciando RuntimeException se la lunghezza non coincide con config(''services.embedding.dimensions'').'
    type: Impl
    status: TODO
    dependencies:
      - TASK-02
  - id: TASK-05
    title: 'Test: parsing risposta valida e mismatch di dimensione'
    description: Feature test con Http::fake() che stub una risposta valida a 1024 elementi e verifica il float[] restituito da embed(); test separato che stub una risposta con dimensione diversa e verifica il lancio di RuntimeException.
    type: Test
    status: TODO
    dependencies:
      - TASK-04
  - id: TASK-06
    title: Gestione errori 4xx/5xx e retry configurabile su embed()
    description: Assicurare che pendingRequest()/embed() propaghi Illuminate\Http\Client\RequestException dopo i tentativi configurati su risposte di errore HTTP del provider, senza swallowing silenzioso.
    type: Impl
    status: TODO
    dependencies:
      - TASK-04
  - id: TASK-07
    title: 'Test: errore provider e conteggio retry'
    description: Feature test con Http::fake() a sequenza di risposte di errore (es. 500, 500) che verifica il lancio di RequestException e che il numero di richieste inviate rispetti retry_times configurato tramite Http::assertSentCount.
    type: Test
    status: TODO
    dependencies:
      - TASK-06
  - id: TASK-08
    title: GenerateProductEmbeddingJob in coda dedicata
    description: Creare App\Jobs\GenerateProductEmbeddingJob (ShouldQueue, onQueue('embeddings')) che riceve un productId, costruisce il testo da vettorizzare dal prodotto, chiama EmbeddingClient::embed() via method injection in handle(), e fa updateOrCreate su ProductEmbedding (product_id + model, content, dimensions, embedding).
    type: Impl
    status: TODO
    dependencies:
      - TASK-04
  - id: TASK-09
    title: 'Test: GenerateProductEmbeddingJob dispatch e persistenza'
    description: 'Feature test GenerateProductEmbeddingJobTest: un test con Queue::fake() verifica il dispatch sulla coda ''embeddings''; un test con Http::fake() ed esecuzione sincrona del job verifica che venga creata/aggiornata la riga ProductEmbedding corretta a partire da una risposta embedding valida.'
    type: Test
    status: TODO
    dependencies:
      - TASK-08
