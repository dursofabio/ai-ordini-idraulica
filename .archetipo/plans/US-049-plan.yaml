    description: Aggiungere la sezione 'confidence' (auto_match_margin_threshold, max_candidates) a config/search.php con le voci gemelle in .env.example. Creare l'enum backed App\Services\Search\MatchOutcome (AutoMatch, Disambiguation, NoResults), stesso pattern di App\Enums\ImportBatchStatus.
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: SearchResult esteso e SearchService::topCandidates()
    description: 'Aggiungere a SearchResult le proprietà readonly vectorScore (?float) e isExactCodeMatch (bool). Centralizzare la mappatura Product→SearchResult in un metodo privato mapToResult() riusato da search()/paginate(). Aggiungere SearchService::topCandidates(string $query, array $filters, int $limit): Collection che riusa buildSearchQuery() con un limit e nessun offset.'
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
