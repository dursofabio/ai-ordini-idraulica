schema: archetipo/plan/v2
spec_code: US-002
body: |-
  # US-002: Filament 5 e Horizon installati e accessibili — Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-07-01

  ---

  ## Spec

  **Epica:** EP-000 — Fondamenta del Progetto
  **Priorità:** HIGH | **Punti:** 2

  **User Story**
  Come sviluppatore del team, voglio Filament 5 e Laravel Horizon installati e accessibili via browser, così da avere il backoffice di amministrazione e il monitoring delle code pronti per i prossimi incrementi.

  **Criteri di Accettazione**
  - [ ] GET /admin risponde con la pagina di login di Filament senza errori 500
  - [ ] GET /horizon risponde con la dashboard di Horizon
  - [ ] Le code `import`, `enrich`, `embed`, `default` sono definite nella configurazione di Horizon
  - [ ] Un utente admin può autenticarsi al backoffice Filament

  ---

  ## Soluzione Tecnica

  Questa spec aggiunge due pacchetti backoffice/monitoring al progetto Laravel già scaffoldato in US-001 (Laravel 13.8, PHP 8.3, stack pgsql/redis): **Filament 5** come pannello di amministrazione servito su `/admin` e **Laravel Horizon** come dashboard di monitoring delle code Redis servita su `/horizon`. Entrambi forniscono UI pre-costruite dai rispettivi pacchetti, quindi non è richiesta alcuna progettazione di interfaccia custom (nessun mockup). Il lavoro consiste nell'installazione, pubblicazione delle risorse, configurazione delle code Horizon e nel rendere il modello `User` idoneo all'accesso al pannello Filament.

  - **Installazione Filament 5:** aggiungere `filament/filament` via Composer ed eseguire `php artisan filament:install --panels`, che genera un `AdminPanelProvider` con path `/admin` e lo registra. Poiché Horizon dipende da Redis e Filament dal driver di sessione/DB, l'ambiente di US-001 (pgsql + redis) è già compatibile.
  - **Accesso admin al pannello:** implementare `FilamentUser` sul modello `App\Models\User` con `canAccessPanel(Panel $panel): bool` così che un utente possa autenticarsi al backoffice. In assenza di un sistema ruoli (introdotto in spec successive), l'MVP consente l'accesso a tutti gli utenti autenticati (o, in alternativa più prudente, filtrando per dominio email) — decisione documentata come assunzione, da restringere quando arriveranno i ruoli.
  - **Seeder utente admin:** prevedere un modo deterministico per ottenere un utente amministratore di test/onboarding (seeder o comando artisan) così da poter effettuare il login su `/admin` sia in locale sia nei test e2e.
  - **Installazione Laravel Horizon:** aggiungere `laravel/horizon` via Composer, eseguire `php artisan horizon:install` (pubblica `config/horizon.php` e gli asset), servendo la dashboard su `/horizon`. In ambiente locale l'accesso alla dashboard è consentito dal gate di default (`viewHorizon`) che in `local` è aperto; in produzione andrà ristretto (fuori scope MVP, ma annotato).
  - **Configurazione code Horizon:** in `config/horizon.php` definire le quattro code richieste `import`, `enrich`, `embed`, `default` all'interno dei supervisor (sezioni `defaults`/`environments`), allineando anche la connessione Redis (`QUEUE_CONNECTION=redis` già impostato in US-001). Queste code corrispondono alle pipeline di import/arricchimento/embedding delle epiche successive.
  - **Registrazione provider e rotte:** verificare che `AdminPanelProvider` e `HorizonServiceProvider` siano registrati (auto-discovery Laravel) e che le rotte `/admin` e `/horizon` rispondano senza errori 500.

  ---

  ## Strategia di Test

  La maggior parte dei criteri di accettazione riguarda dashboard fornite da pacchetti terzi (Filament, Horizon) già coperti dai loro test interni; il nostro focus è verificare la corretta integrazione e configurazione nel progetto tramite feature test HTTP, più uno scenario e2e per l'unico flusso di reale interazione utente (login admin).

  - **Feature test rotta /admin:** una richiesta HTTP GET a `/admin` (utente guest) deve restituire una risposta valida (redirect alla pagina di login o pagina di login 200), non un errore 500.
  - **Feature test rotta /horizon:** una richiesta HTTP GET a `/horizon` in ambiente di test deve restituire status 200 (dashboard raggiungibile, gate `viewHorizon` aperto in test/local).
  - **Test di configurazione code Horizon:** un test che carica `config('horizon')` e asserisce che le code `import`, `enrich`, `embed`, `default` siano presenti nella configurazione dei supervisor.
  - **Feature test accesso pannello:** un test che autentica un utente admin (via factory/seeder) ed esegue GET `/admin` verificando l'accesso autorizzato (status 200), più un test che verifica `User::canAccessPanel()` ritorni true per l'admin.

  ### Test E2E — Simulazione Utente

  **Framework:** Laravel Dusk (browser testing nativo di Laravel; nessun framework e2e è attualmente installato, quindi è previsto un task di setup). Artefatti visivi: screenshot ad ogni step chiave e su fallimento, salvati in `docs/test-results/US-002/`; log di console browser abilitati. (Nota: Dusk non registra video nativamente; gli screenshot per-step fungono da artefatto visivo del run.)

  | Scenario | Descrizione flusso utente |
  |---|---|
  | Login admin al backoffice Filament | L'admin apre `/admin`, viene reindirizzato alla pagina di login Filament, inserisce email e password validi, invia il form e atterra sulla dashboard Filament autenticato. Screenshot salvati in docs/test-results/US-002/. |

  ---

  _Piano generato tramite ARchetipo Planning — 2026-07-01_
