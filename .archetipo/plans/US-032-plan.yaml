schema: archetipo/plan/v2
spec_code: US-032
body: |-
  # US-032: Collegamento diretto marca/famiglia/sottofamiglia da valori già presenti nel file — Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-07-02

  ---

  ## Spec

  **Epica:** EP-003 — Arricchimento Deterministico
  **Priorità:** HIGH | **Punti:** 5

  **User Story**
  Come amministratore del catalogo, voglio che marca, famiglia e sottofamiglia già presenti nel file di import vengano collegate direttamente al prodotto quando corrispondono a una voce di tassonomia esistente, così da evitare deduzioni testuali inutili (e potenzialmente errate) quando il dato è già certo nel file sorgente.

  **Criteri di Accettazione**
  - Per ogni riga promossa a prodotto, se il codice o l'etichetta di Marca/Fam/S.Fam della riga corrisponde a un Brand/Family/Subfamily già esistente in tassonomia, il prodotto viene collegato direttamente con `brand_source`/`family_source`/`subfamily_source = 'file'`
  - Il collegamento da file ha priorità assoluta: viene eseguito prima della deduzione testuale, del clustering e della propagazione nella pipeline di arricchimento deterministico
  - Un prodotto già collegato con source `'file'` non viene mai sovrascritto da propagazione, deduzione testuale o classificazione AI
  - Se il valore non corrisponde a nessuna voce di tassonomia, il prodotto segue il normale flusso (deduzione testuale, propagazione, AI)
  - Test per: match per codice, match per etichetta, nessun match, non sovrascrittura di un valore già `'file'`

  ---

  ## Soluzione Tecnica

  Oggi `ImportXlsxJob` mappa in `staging_articoli` solo `codice_articolo`/`descrizione`/`costo`/`giacenza`; i valori Marca/Fam/S.Fam del file restano solo dentro `raw_row` (JSON) e vengono letti oggi esclusivamente da `catalog:seed-taxonomy` per creare/aggiornare le tabelle `brands`/`families`/`subfamilies` (con il codice ERP come alias) — mai per collegare il prodotto della riga. Il collegamento marca/famiglia/sottofamiglia avviene oggi solo per deduzione testuale (`BrandResolver`), propagazione tra varianti (`FamilyPropagationResolver`) o classificazione AI (`EnrichmentApplier`), nessuno dei quali guarda il valore esplicito della riga. La soluzione introduce una nuova sorgente `'file'`, prioritaria su tutte le altre, riusando `TaxonomyCatalog` (già usato da `EnrichmentApplier` per validare i risultati AI contro la tassonomia chiusa) invece di reinventare una ricerca per alias.

  - **Persistenza dei valori grezzi su `products`**: nuova migrazione aggiunge a `products` le colonne nullable `marca_codice`, `fam_codice`, `fam_descrizione`, `subfam_codice`, `subfam_descrizione` (la colonna `descrizione_marca` esiste già ma è oggi orfana: nessun job la valorizza). `PromoteStagingToProductsJob`, che già itera `$row->raw_row` (StagingArticolo::casts `raw_row` come array), estrae le stesse chiavi normalizzate già usate da `CatalogSeedTaxonomyCommand` (`marca`, `descrizione_marca`, `fam`, `descrizione_fam`, `s_fam`, `descrizione_s_fam`) e le include nell'upsert, in entrambi i rami (`newOrChanged` e `unchanged`) così il dato grezzo resta disponibile per l'enrichment anche quando la descrizione non cambia. Tenerlo su `products` (invece che rileggere `staging_articoli` a runtime) disaccoppia l'enrichment dal ciclo di vita/retention delle righe di staging.
  - **Nuovo resolver deterministico `FileTaxonomyResolver`** (`app/Services/Enrichment/`), sullo stesso pattern di `BrandResolver`/`FamilyPropagationResolver`: per ciascuna dimensione (marca/fam/sottofamiglia), se il campo `*_id` è già valorizzato non fa nulla (idempotenza, stesso guard di `BrandResolver::resolve()`); altrimenti calcola `$name = $descrizione ?: $codice` (stesso fallback usato da `CatalogSeedTaxonomyCommand::seedBrands/seedFamilies`, che è esattamente il valore diventato `name` in tassonomia) e lo risolve con `TaxonomyCatalog::findBrand()`/`findFamily()`/`findSubfamily($name, $famName)` — quest'ultimo scoped alla famiglia usando il nome grezzo di Fam della riga, indipendentemente dal fatto che la famiglia sia stata risolta in questa stessa chiamata. Su match imposta `*_id` e `*_source = 'file'`; per la marca imposta anche `confidence = 100` (superiore ai 95/80 di regex/dizionario, coerente con l'essere un dato certo di provenienza file). Nessun match lascia il prodotto invariato su quel campo.
  - **Ordinamento nella pipeline**: `DeterministicEnrichmentPipeline::run()` invoca `FileTaxonomyResolver` per primo, prima di `BrandResolver`, `AttributeResolver`, `GroupingResolver` e `FamilyPropagationResolver`, cosi che i guard di idempotenza già esistenti in questi resolver (`if brand_id !== null return false`, `whereNull($column)` in `FamilyPropagationResolver`) impediscano automaticamente qualsiasi tentativo di deduzione successiva sui campi già risolti da file — nessuna modifica ai resolver esistenti oltre all'ordine di chiamata e all'estensione del summary array con i nuovi contatori.
  - **Protezione da sovrascrittura AI**: `EnrichmentApplier::resolvedAttributes()` oggi esclude dalla scrittura solo i campi con `*_source === 'manual'`; va esteso per escludere anche `*_source === 'file'`, altrimenti un prodotto con marca risolta da file ma famiglia ancora `null` verrebbe comunque selezionato da `ClassificationBatchDispatcher` (che seleziona su `whereNull('brand_id') OR whereNull('family_id')`) e l'AI potrebbe sovrascrivere la marca già certa.

  ---

  ## Strategia di Test

  Nessun test esistente presuppone che sorgenti diverse da `'manual'` vengano sovrascritte dall'AI, quindi l'estensione del guard in `EnrichmentApplier` non rompe la suite attuale; tutti i nuovi comportamenti sono coperti da test mirati sui singoli livelli (resolver, pipeline, job di promozione, applier) più la rigenerazione dello schema atteso.

  - `FileTaxonomyResolverTest` (nuovo): match per codice, match per etichetta, nessun match (nessuna scrittura), sottofamiglia risolta correttamente scoped alla famiglia della riga, e non sovrascrittura di un `brand_id`/`family_id`/`subfamily_id` già presente.
  - `PromoteStagingToProductsJobTest` (estensione): le colonne grezze (`marca_codice`, `descrizione_marca`, `fam_codice`, `fam_descrizione`, `subfam_codice`, `subfam_descrizione`) vengono scritte sia per un prodotto nuovo sia per un aggiornamento con descrizione invariata.
  - `DeterministicEnrichmentPipelineTest` (estensione): un prodotto con Marca di riga già in tassonomia e una descrizione che conterrebbe anche un match testuale valido riceve `brand_source = 'file'`, non `'regex'`/`'dictionary'`, e il clustering (`GroupingResolver`) procede comunque usando il brand risolto da file.
  - `EnrichmentApplierTest` (estensione): un campo con `*_source = 'file'` non viene sovrascritto da un risultato di classificazione AI ad alta confidenza, sullo stesso modello del test già esistente per `'manual'`.
  - `ProductCatalogSchemaTest` (estensione): l'elenco delle colonne attese di `products` include le nuove colonne grezze.
  - Esecuzione mirata con `vendor/bin/sail artisan test --compact` sui file toccati, poi `vendor/bin/sail bin pint --dirty --format agent` sui file PHP modificati.

  ---

  _Piano generato via ARchetipo Planning — 2026-07-02_
tasks:
  - id: TASK-01
    title: 'Migrazione: colonne raw taxonomy su products'
    description: Aggiungere a products le colonne nullable marca_codice, fam_codice, fam_descrizione, subfam_codice, subfam_descrizione (descrizione_marca esiste già ma è orfana).
    type: Impl
    status: TODO
  - id: TASK-02
    title: Aggiornare ProductCatalogSchemaTest
    description: Estendere l'elenco delle colonne attese di products con le nuove colonne raw taxonomy introdotte da TASK-01.
    type: Test
    status: TODO
    dependencies:
      - TASK-01
  - id: TASK-03
    title: Propagare i valori grezzi in PromoteStagingToProductsJob
    description: Estrarre marca/descrizione_marca/fam/descrizione_fam/s_fam/descrizione_s_fam da $row->raw_row e includerli nell'upsert (rami newOrChanged e unchanged, incluse le colonne da aggiornare).
    type: Impl
    status: TODO
    dependencies:
      - TASK-01
  - id: TASK-04
    title: Test di promozione dei valori grezzi
    description: Estendere PromoteStagingToProductsJobTest per verificare che le colonne raw taxonomy siano popolate sia per un prodotto nuovo sia per un aggiornamento con descrizione invariata.
    type: Test
    status: TODO
    dependencies:
      - TASK-03
  - id: TASK-05
    title: Creare FileTaxonomyResolver
    description: Nuovo resolver in app/Services/Enrichment/ che risolve brand_id/family_id/subfamily_id da marca_codice|descrizione_marca, fam_codice|fam_descrizione, subfam_codice|subfam_descrizione tramite TaxonomyCatalog, impostando *_source='file' (e confidence=100 per la marca) solo quando il campo è ancora null e il valore corrisponde a una voce esistente.
    type: Impl
    status: TODO
    dependencies:
      - TASK-03
  - id: TASK-06
    title: Test unitari FileTaxonomyResolver
    description: 'Coprire: match per codice, match per etichetta, nessun match, sottofamiglia scoped alla famiglia della riga, non sovrascrittura di valori già presenti.'
    type: Test
    status: TODO
    dependencies:
      - TASK-05
  - id: TASK-07
    title: Integrare FileTaxonomyResolver nella pipeline deterministica
    description: Invocare FileTaxonomyResolver per primo in DeterministicEnrichmentPipeline::run(), prima di BrandResolver/AttributeResolver/GroupingResolver/FamilyPropagationResolver, ed estendere l'array di summary con i nuovi contatori.
    type: Impl
    status: TODO
    dependencies:
      - TASK-05
  - id: TASK-08
    title: Test di ordinamento della pipeline
    description: 'Estendere DeterministicEnrichmentPipelineTest: un prodotto con marca di riga già in tassonomia riceve brand_source=''file'' anche quando la descrizione conterrebbe un match testuale valido, e il clustering usa comunque il brand risolto da file.'
    type: Test
    status: TODO
    dependencies:
      - TASK-07
  - id: TASK-09
    title: Proteggere i campi 'file' dalla sovrascrittura AI
    description: Estendere i guard in EnrichmentApplier::resolvedAttributes() da '!== manual' a '!== manual && !== file' per brand_source/family_source/subfamily_source.
    type: Impl
    status: TODO
    dependencies:
      - TASK-07
  - id: TASK-10
    title: Test di non sovrascrittura AI per source 'file'
    description: Estendere EnrichmentApplierTest con un caso analogo al test 'manual' esistente ma con *_source='file'.
    type: Test
    status: TODO
    dependencies:
      - TASK-09
  - id: TASK-11
    title: Regressione e formattazione
    description: Eseguire la suite completa dei test toccati (PromoteStagingToProductsJobTest, FileTaxonomyResolverTest, DeterministicEnrichmentPipelineTest, EnrichmentApplierTest, CatalogSeedTaxonomyCommandTest, ProductCatalogSchemaTest) e vendor/bin/sail bin pint --dirty --format agent sui file modificati.
    type: Test
    status: TODO
    dependencies:
      - TASK-02
      - TASK-04
      - TASK-06
      - TASK-08
      - TASK-10
