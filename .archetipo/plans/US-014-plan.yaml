schema: archetipo/plan/v2
spec_code: US-014
body: |
  # US-014: Job classificazione AI a lotti con output strutturato — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-01

  ---

  ## Spec

  **Epic:** EP-004 — Arricchimento AI
  **Priority:** HIGH | **Points:** 5

  **User Story**
  Come amministratore del catalogo, voglio che i prodotti privi di marca o famiglia vengano classificati automaticamente dall'AI in lotti, così da completare la tassonomia del catalogo in modo rapido ed economico.

  **Acceptance Criteria**
  - Il job aggrega 20-50 prodotti per chiamata API per ridurre l'overhead
  - La risposta è JSON valido con lo schema atteso; se non valida → un retry, poi `needs_review`
  - Solo famiglie e marche della tassonomia esistente possono essere assegnate (tassonomia chiusa)
  - Ogni elaborazione produce un record in `enrichment_logs` con input, output, confidence, tokens, modello
  - Il job usa il modello veloce (haiku) per la classificazione massiva e il modello smart (sonnet) solo per i casi a bassa confidenza

  ---

  ## Technical Solution

  Introduciamo il layer di classificazione AI sopra `App\Services\Ai\ClaudeClient` (US-013), riusando gli stessi pattern architetturali degli altri job di import (`ImportXlsxJob`, `PromoteStagingToProductsJob` in `App\Jobs`, chunking a dimensione fissa, `ShouldQueue` con `onQueue()` dedicata) e dei resolver deterministici EP-003 (`App\Services\Enrichment\BrandResolver`, `GroupingResolver`, idempotenza via guardia su colonne già valorizzate). US-014 si ferma alla produzione dell'output strutturato e al logging in `enrichment_logs`: l'applicazione dei valori AI ai prodotti (`brand_id`, `family_id`, `subfamily_id`, `enrichment_status='enriched'|'needs_review'` in base alla confidence) è esplicitamente demandata a US-015 (bloccata da questa spec), che leggerà l'ultimo `enrichment_logs` per prodotto. L'unica eccezione è il fallimento di validazione JSON dopo il retry, che l'AC richiede di marcare direttamente `needs_review` perché in quel caso non esiste alcun output AI da applicare in futuro.

  - **Configurazione modelli (`config/services.php`):** estendere il blocco `anthropic` esistente con `model_fast` (env `ANTHROPIC_MODEL_FAST`, default `claude-3-5-haiku-latest`) e `model_smart` (env `ANTHROPIC_MODEL_SMART`, default `claude-sonnet-4-5`), lasciando invariata la chiave `model` già usata da US-013 per compatibilità. Documentare le stesse variabili in `.env.example`. Nessun hardcoding del nome modello nel codice del job.
  - **`App\Services\Ai\TaxonomyCatalog`:** nuovo servizio che carica (e memoizza per istanza, stesso pattern di `BrandResolver::brands()`) l'elenco chiuso di marche/famiglie/sottofamiglie esistenti (`id`, `name`, `slug`) e lo serializza in una porzione di prompt (elenco puntato nome+slug) da iniettare nella chiamata AI, così il modello può scegliere solo tra valori ammessi. Espone anche `isValidBrand(string $name)`, `isValidFamily(string $name)`, `isValidSubfamily(string $name, ?string $family)` usati dal validatore di output per rigettare valori fuori tassonomia.
  - **`App\Services\Ai\ClassificationPromptBuilder`:** costruisce il payload `messages` per Claude a partire da un lotto di prodotti (`codice_articolo`, `description_clean`/`description_raw`) e dal `TaxonomyCatalog`, richiedendo esplicitamente una risposta JSON con schema `{"results": [{"codice_articolo", "brand", "family", "subfamily", "product_type", "enriched_description", "confidence"}]}` (confidence 0-100 intera). Il prompt istruisce il modello a lasciare i campi `null` quando incerto piuttosto che inventare valori fuori tassonomia.
  - **`App\Services\Ai\ClassificationResponseValidator`:** decodifica la stringa `content` restituita da `ClaudeResponse` con `json_decode` e valida: (1) JSON sintatticamente valido, (2) struttura attesa (`results` array, un elemento per ogni `codice_articolo` richiesto), (3) marca/famiglia/sottofamiglia — se valorizzate — appartengono alla tassonomia chiusa via `TaxonomyCatalog`. Ritorna un DTO `ValidatedClassification` (readonly, lista di risultati tipati) oppure lancia `InvalidClassificationResponseException` che il job intercetta per il retry.
  - **`App\Jobs\ClassifyProductsBatchJob`:** `ShouldQueue`, `onQueue('enrichment')`, costruito con una collezione di ID prodotto (20-50, la dimensione lotto è responsabilità del dispatcher, non del job — un solo job elabora sempre un solo lotto già dimensionato). `handle(ClaudeClient $client, ClassificationResponseValidator $validator)`: costruisce il prompt col modello veloce (`config('services.anthropic.model_fast')`), chiama `ClaudeClient::messages()`, valida la risposta; se invalida → un secondo tentativo identico (stesso modello, stesso prompt, in linea con l'AC "un retry"); se anche il secondo tentativo è invalido, marca **tutti** i prodotti del lotto `enrichment_status='needs_review'` e logga comunque un `enrichment_logs` per prodotto con `output` contenente l'errore di validazione e `confidence=null`, poi termina senza eccezione (non è un errore di job da far ritentare da Horizon, è un esito di dominio già gestito). Se la risposta è valida, per ogni risultato con `confidence < 60` (soglia "bassa confidenza", stessa soglia di `needs_review` bassa usata da US-015) ri-classifica il singolo prodotto con una seconda chiamata usando `model_smart`, sovrascrivendo il risultato di quel prodotto con l'esito del modello smart prima del logging. Ogni prodotto del lotto produce esattamente un record `enrichment_logs` (step `'ai_classification'`) con `input` (payload prodotto inviato), `output` (risultato AI validato o errore), `confidence`, `model` (fast o smart, quello effettivamente usato), `tokens_in`/`tokens_out` proporzionati (token totali della chiamata suddivisi per il numero di prodotti nel lotto, arrotondati, dato che l'API restituisce un totale per la chiamata batched e non per singolo item).
  - **`App\Services\Enrichment\ClassificationBatchDispatcher`:** servizio che seleziona i prodotti con `brand_id` o `family_id` nulli e `enrichment_status='pending'`, li pagina in lotti di dimensione configurabile (default 40, nel range 20-50 richiesto dall'AC) e dispatcha un `ClassifyProductsBatchJob` per lotto. Verrà invocato da un comando Artisan dedicato in una spec successiva (fuori scope qui); per questa spec basta il servizio testabile in isolamento più un utilizzo diretto nei test.
  - **Idempotenza:** in linea con `BrandResolver`/`GroupingResolver`, il job salta (non richiama l'AI, non duplica il log) i prodotti che nel frattempo hanno già `brand_id` e `family_id` valorizzati quando il job viene eseguito (es. rientrato in coda due volte), riducendo sprechi di token.

  ---

  ## Test Strategy

  Feature test con `Http::fake()` (nessuna chiamata rete reale, stesso approccio di `ClaudeClientTest`) combinati con `RefreshDatabase`/`RequiresDatabase` per i test che toccano `enrichment_logs` e la tassonomia, seguendo la convenzione di `BrandResolverTest`/`GroupingResolverTest`.

  - `TaxonomyCatalog` espone correttamente marche/famiglie/sottofamiglie esistenti e la validazione respinge nomi non presenti in tassonomia (case-insensitive su name/slug).
  - `ClassificationPromptBuilder` produce un payload `messages` che include tutti i `codice_articolo` del lotto e l'elenco tassonomia chiuso.
  - `ClassificationResponseValidator` accetta una risposta JSON conforme e rigetta: JSON sintatticamente non valido, struttura con chiavi mancanti, marca/famiglia fuori tassonomia.
  - `ClassifyProductsBatchJob`: con `Http::fake()` che restituisce una risposta valida al primo tentativo, verifica che venga creato un `EnrichmentLog` per prodotto con `model` = modello veloce e i token attesi, e che nessuna chiamata col modello smart venga effettuata quando tutte le confidence sono >= 60.
  - `ClassifyProductsBatchJob`: con `Http::fake()` che restituisce JSON non valido su entrambi i tentativi, verifica che tutti i prodotti del lotto finiscano `enrichment_status='needs_review'`, che vengano comunque creati i log e che il job non lanci eccezioni (via `Http::assertSentCount` per confermare esattamente 2 tentativi, coerente con l'AC "un retry").
  - `ClassifyProductsBatchJob`: con una risposta valida contenente almeno un item con `confidence < 60`, verifica che venga effettuata una chiamata aggiuntiva con `model_smart` solo per quell'item (assert su `Http::assertSent` sul body/model della seconda richiesta) e che il log finale per quel prodotto riporti il modello smart.
  - `ClassificationBatchDispatcher`: con un set misto di prodotti (con/senza brand, con enrichment_status vari), verifica che vengano dispatchati job solo per i prodotti eleggibili e che ogni job riceva un lotto tra 20 e 50 elementi (`Queue::fake()` + `Queue::assertPushed` con asserzione sulla dimensione della collezione passata al job).
  - Nessun lavoro UI: la spec è puramente infrastrutturale/backend (job in coda + servizi di dominio), non è richiesta strategia e2e né mockup.

  ---

  _Plan generated via ARchetipo Planning — 2026-07-01_
tasks:
  - id: TASK-01
    title: Config model_fast/model_smart e .env.example
    description: Estendere config/services.php nel blocco 'anthropic' con model_fast (env ANTHROPIC_MODEL_FAST, default claude-3-5-haiku-latest) e model_smart (env ANTHROPIC_MODEL_SMART, default claude-sonnet-4-5). Documentare le stesse variabili in .env.example.
    type: Impl
    status: TODO
  - id: TASK-02
    title: 'TaxonomyCatalog: tassonomia chiusa marche/famiglie/sottofamiglie'
    description: Creare App\Services\Ai\TaxonomyCatalog che carica e memoizza (per istanza) Brand/Family/Subfamily esistenti ed espone un rendering testuale per il prompt e i metodi isValidBrand/isValidFamily/isValidSubfamily per la validazione dell'output AI.
    type: Impl
    status: TODO
  - id: TASK-03
    title: 'Test: TaxonomyCatalog validazione tassonomia chiusa'
    description: Feature test che verifica che TaxonomyCatalog riconosca come validi solo marche/famiglie/sottofamiglie esistenti nel database (case-insensitive su name/slug) e rigetti qualsiasi valore non presente.
    type: Test
    status: TODO
    dependencies:
      - TASK-02
  - id: TASK-04
    title: 'ClassificationPromptBuilder: payload messages per lotto'
    description: 'Creare App\Services\Ai\ClassificationPromptBuilder che, dato un lotto di prodotti e un TaxonomyCatalog, costruisce il payload ''messages'' per ClaudeClient::messages() richiedendo una risposta JSON con schema {results: [{codice_articolo, brand, family, subfamily, product_type, enriched_description, confidence}]} e includendo l''elenco tassonomia chiuso nel prompt.'
    type: Impl
    status: TODO
    dependencies:
      - TASK-02
  - id: TASK-05
    title: 'Test: ClassificationPromptBuilder include lotto e tassonomia'
    description: Feature test che verifica che il payload generato includa tutti i codice_articolo del lotto passato e l'elenco delle marche/famiglie esistenti nel testo del prompt.
    type: Test
    status: TODO
    dependencies:
      - TASK-04
  - id: TASK-06
    title: 'ClassificationResponseValidator: parsing e validazione schema/tassonomia'
    description: Creare App\Services\Ai\ClassificationResponseValidator che decodifica il content di ClaudeResponse, verifica JSON sintatticamente valido, struttura attesa (un risultato per ogni codice_articolo richiesto) e che marca/famiglia/sottofamiglia valorizzate appartengano alla tassonomia chiusa (via TaxonomyCatalog), restituendo un DTO ValidatedClassification o lanciando InvalidClassificationResponseException.
    type: Impl
    status: TODO
    dependencies:
      - TASK-02
  - id: TASK-07
    title: 'Test: ClassificationResponseValidator accetta/rigetta risposte'
    description: Feature test che verifica accettazione di una risposta JSON conforme e rigetto (con eccezione) per JSON sintatticamente non valido, struttura con chiavi/risultati mancanti, e marca/famiglia fuori tassonomia.
    type: Test
    status: TODO
    dependencies:
      - TASK-06
  - id: TASK-08
    title: 'ClassifyProductsBatchJob: classificazione lotto con modello veloce'
    description: Creare App\Jobs\ClassifyProductsBatchJob (ShouldQueue, onQueue('enrichment')) che riceve un lotto di ID prodotto, costruisce il prompt via ClassificationPromptBuilder, chiama ClaudeClient::messages() col modello configurato in model_fast, valida la risposta con ClassificationResponseValidator e crea un EnrichmentLog (step 'ai_classification') per ogni prodotto con input/output/confidence/model/tokens_in/tokens_out (token del lotto ripartiti per prodotto). Salta i prodotti già completamente classificati (idempotenza).
    type: Impl
    status: TODO
    dependencies:
      - TASK-04
      - TASK-06
      - TASK-01
  - id: TASK-09
    title: 'Test: ClassifyProductsBatchJob successo con modello veloce'
    description: Feature test con Http::fake() che stub una risposta valida al primo tentativo (tutte confidence >= 60) e verifica che venga creato un EnrichmentLog per prodotto con model = model_fast, token ripartiti correttamente, e che non venga effettuata alcuna chiamata col modello smart.
    type: Test
    status: TODO
    dependencies:
      - TASK-08
  - id: TASK-10
    title: 'ClassifyProductsBatchJob: retry singolo su JSON invalido e needs_review'
    description: Estendere il job per ritentare una sola volta (stesso modello, stesso prompt) quando la risposta non supera la validazione; se anche il secondo tentativo fallisce, impostare enrichment_status='needs_review' su tutti i prodotti del lotto e loggare comunque un EnrichmentLog per prodotto con l'errore di validazione e confidence null, senza lanciare eccezioni.
    type: Impl
    status: TODO
    dependencies:
      - TASK-08
  - id: TASK-11
    title: 'Test: ClassifyProductsBatchJob doppio fallimento JSON → needs_review'
    description: Feature test con Http::fake() che restituisce JSON non valido su entrambi i tentativi; verifica enrichment_status='needs_review' su tutti i prodotti del lotto, presenza dei log di errore per ciascuno, e Http::assertSentCount pari a 2 (un retry).
    type: Test
    status: TODO
    dependencies:
      - TASK-10
  - id: TASK-12
    title: 'ClassifyProductsBatchJob: escalation a modello smart su bassa confidenza'
    description: Estendere il job affinché, per ogni risultato valido con confidence < 60, effettui una seconda chiamata ClaudeClient::messages() con model_smart per il solo prodotto interessato, sovrascrivendo il risultato di quel prodotto prima del logging finale (model registrato = model_smart per quel record).
    type: Impl
    status: TODO
    dependencies:
      - TASK-09
  - id: TASK-13
    title: 'Test: ClassifyProductsBatchJob escalation modello smart'
    description: Feature test con Http::fake() in cui la risposta del lotto contiene un item con confidence < 60; verifica che venga effettuata una chiamata aggiuntiva usando model_smart solo per quel prodotto (assert su modello nel body della seconda richiesta) e che il log finale di quel prodotto riporti model_smart.
    type: Test
    status: TODO
    dependencies:
      - TASK-12
  - id: TASK-14
    title: 'ClassificationBatchDispatcher: selezione ed accodamento lotti'
    description: Creare App\Services\Enrichment\ClassificationBatchDispatcher che seleziona i prodotti con brand_id o family_id nulli e enrichment_status='pending', li divide in lotti da 20 a 50 (default 40) e dispatcha un ClassifyProductsBatchJob per lotto.
    type: Impl
    status: TODO
    dependencies:
      - TASK-08
  - id: TASK-15
    title: 'Test: ClassificationBatchDispatcher selezione e dimensione lotti'
    description: Feature test con Queue::fake() e un set misto di prodotti (con/senza brand, enrichment_status vari) che verifica che vengano dispatchati job solo per i prodotti eleggibili e che ogni lotto passato al job abbia dimensione tra 20 e 50.
    type: Test
    status: TODO
    dependencies:
      - TASK-14
