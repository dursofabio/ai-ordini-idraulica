schema: archetipo/plan/v2
spec_code: US-030
body: |-
  # US-030: Vista di dettaglio prodotto con storico enrichment e stato embedding — Piano di Implementazione

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-07-02

  ---

  ## Spec

  **Epica:** EP-007 — Backoffice Filament
  **Priorità:** HIGH | **Punti:** 3

  **User Story**
  Come amministratore del catalogo, voglio aprire un prodotto e vedere lo storico di come è stato arricchito e se il suo prodotto-base ha un embedding generato, così da capire perché un prodotto ha un certo brand/famiglia/confidenza senza dover ispezionare `enrichment_logs` a mano.

  **Criteri di Accettazione**
  - Dalla lista prodotti è possibile aprire una pagina di visualizzazione dedicata per il singolo prodotto (non solo l'edit)
  - La pagina mostra, in ordine cronologico, ogni riga di `enrichment_logs` collegata al prodotto: step, esito/confidenza, modello usato, token input/output quando presenti
  - Se il prodotto non ha ancora voci di enrichment, la sezione mostra uno stato vuoto esplicito ("nessun arricchimento eseguito")
  - La pagina mostra lo stato dell'embedding del prodotto-base collegato: presente (con modello e data generazione) oppure assente
  - I campi con origine manuale (`*_source = 'manual'`) restano visivamente distinti come già avviene nella lista/form esistente

  ---

  ## Soluzione Tecnica

  Si introduce una pagina `ViewProduct` (prima `ViewRecord` di `ProductResource`, stesso pattern nativo Filament già pianificato per `ImportBatchResource` in US-029) con un `ProductInfolist` dedicato, esposto tramite `ProductResource::infolist()`. Nessuna migrazione: tutti i dati necessari sono già persistiti (`enrichment_logs` da US-013/US-014, `product_embeddings` da US-017).

  - **Navigazione verso il dettaglio (AC1)**: aggiunta `ViewAction::make()` in `ProductsTable::configure()` accanto alla `EditAction` esistente; nuova route `'view' => ViewProduct::route('/{record}')` in `ProductResource::getPages()`. La pagina `EditProduct` resta invariata (nessuna modifica al flusso di modifica esistente).
  - **Identità prodotto e distinzione manuale (AC5)**: sezione "Prodotto" nell'infolist con `codice_articolo`, `description_raw` e `brand`/`family`/`subfamily` come `TextEntry` badge, riusando esattamente la stessa logica di colore/icona (`info` + `Heroicon::OutlinedLockClosed` quando `*_source === 'manual'`, altrimenti `gray`/nessuna icona) già presente in `ProductsTable` — nessuna nuova convenzione visiva introdotta, coerenza con lista/form esistenti come richiesto dall'AC.
  - **Storico enrichment (AC2/AC3)**: sezione "Storico Arricchimento" con `RepeatableEntry::make('enrichmentLogs')` in layout `->table([...])` (colonne: step, esito/confidenza, modello, token input, token output). L'ordine cronologico è garantito da uno `->state(fn (Product $record) => $record->enrichmentLogs()->orderBy('created_at')->get())` locale all'entry, senza toccare la relazione `Product::enrichmentLogs()` (usata invariata altrove, es. `VectorStagingAuditRelationsTest`, minimal disruption). Lo stato vuoto esplicito è un `TextEntry` placeholder ("Nessun arricchimento eseguito") con `->visible(fn (Product $record) => $record->enrichmentLogs->isEmpty())`, mentre il repeatable ha `->visible(fn (Product $record) => $record->enrichmentLogs->isNotEmpty())` — nessun componente custom, solo composizione di entry native.
  - **Stato embedding (AC4)**: sezione "Stato Embedding" con un `TextEntry` badge derivato (`->state(fn (Product $record) => $record->productBase?->embedding ? 'Generato' : 'Assente')`, colore `success`/`gray`) più `TextEntry::make('productBase.embedding.model')` e `TextEntry::make('productBase.embedding.created_at')->dateTime()`, entrambi `->visible()` solo quando l'embedding esiste. L'accesso `productBase?->embedding` è null-safe sia per prodotti senza `product_base_id` sia per basi senza embedding generato, coprendo entrambi i casi "assente" dell'AC in un'unica condizione.

  **Alternative scartate**: mockup dedicato (la pagina riusa componenti Filament nativi — Section/TextEntry/RepeatableEntry — e la stessa logica badge già stabilita in `ProductsTable`/`ProductForm`, nessuna interfaccia custom da progettare, stessa motivazione già adottata in US-021/US-025/US-029); ordinare cronologicamente modificando `Product::enrichmentLogs()` con un `orderBy` permanente sulla relazione (scartato per minimal disruption, altri consumer della relazione non hanno bisogno di un ordine specifico ed è più sicuro isolare l'ordinamento nell'entry che lo richiede).

  ---

  ## Strategia di Test

  Test Feature con `Livewire::test()`, seguendo il pattern già usato in `ProductResourceTest`. Nessuna infrastruttura e2e richiesta: come già deciso per US-029 (stessa epica, stesso tipo di pagina), la spec aggiunge una vista di sola lettura su dati già coperti da test di dominio (`VectorStagingAuditRelationsTest`), non un nuovo flusso utente interattivo end-to-end — l'infrastruttura Dusk esistente nel progetto resta riservata ai flussi con interazione reale (es. `ProductManualBrandOverrideTest`).

  - Navigazione: la lista prodotti espone l'azione di visualizzazione; la pagina `ViewProduct` carica correttamente (`assertOk`) per un prodotto esistente
  - Storico enrichment: con più `EnrichmentLog` collegati a un prodotto, l'infolist mostra step/confidenza/modello/token nell'ordine cronologico corretto (`assertSchemaStateSet` sulla relazione ordinata); con zero log collegati, è visibile il messaggio di stato vuoto e il repeatable non è visibile
  - Stato embedding: caso `ProductBase` con `ProductEmbedding` collegato (modello e data visibili), caso `ProductBase` senza embedding, caso `Product` senza `product_base_id` — tutti e tre devono risultare in stato "Assente" tranne il primo
  - Distinzione manuale: `assertSchemaComponentExists()` con `checkComponentUsing` sull'entry brand/family per verificare colore `info`/icona lucchetto quando `*_source === 'manual'`, colore `gray`/nessuna icona altrimenti — stessa tecnica già usata in `ProductResourceTest::test_manual_brand_is_visually_distinct_in_table`, adattata da colonna tabella a entry infolist

  ---

  _Piano generato via ARchetipo Planning — 2026-07-02_
