spec_code: US-013
body: |
  # US-013: Client Claude HTTP per chiamate Messages e Batch — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-01

  ---

  ## Spec

  **Epic:** EP-004 — Arricchimento AI
  **Priority:** HIGH | **Points:** 2

  **User Story**
  Come sviluppatore del team, voglio un client HTTP per le API di Claude configurato tramite variabili d'ambiente, così da poter chiamare l'AI in modo sicuro e controllato da tutti i job di arricchimento.

  **Acceptance Criteria**
  - Il client legge modello e chiave API da `config('services.anthropic.*')`
  - Le chiamate includono gli header `x-api-key` e `anthropic-version` corretti
  - Il client ha retry configurabile (max 2 tentativi, delay 2s) e timeout di 120s
  - L'uso dei token (`tokens_in`, `tokens_out`) è estratto dalla risposta e restituito al chiamante
  - Un test con mock HTTP verifica comportamento su risposta valida e su errore HTTP 4xx/5xx

  ---

  ## Technical Solution

  Introduciamo `App\Services\Ai\ClaudeClient` (nuovo namespace `App\Services\Ai`, sorella di `App\Services\Enrichment` già esistente per i resolver deterministici EP-003), un thin wrapper attorno al facade `Http` di Laravel dedicato alle API Messages e Batch di Anthropic. Nessun package esterno (niente SDK Anthropic non ufficiale) — coerente con la convenzione del progetto di non aggiungere dipendenze senza approvazione e con il fatto che il resto dello stack usa già `Http::` per integrazioni esterne.

  - **Configurazione (`config/services.php`):** aggiungere blocco `'anthropic' => ['api_key' => env('ANTHROPIC_API_KEY'), 'model' => env('ANTHROPIC_MODEL', 'claude-3-5-haiku-latest'), 'version' => env('ANTHROPIC_VERSION', '2023-06-01'), 'base_url' => env('ANTHROPIC_BASE_URL', 'https://api.anthropic.com'), 'timeout' => env('ANTHROPIC_TIMEOUT', 120), 'retry_times' => env('ANTHROPIC_RETRY_TIMES', 2), 'retry_delay_ms' => env('ANTHROPIC_RETRY_DELAY_MS', 2000)]`. Nessuna chiave hardcodata nel codice, tutto passa da `env()`/`config()` come richiesto dal criterio di accettazione. Aggiungere le stesse chiavi (vuote/dummy) a `.env.example` per documentare le variabili disponibili.
  - **`ClaudeClient::messages(array $payload): ClaudeResponse`:** costruisce la richiesta con `Http::withHeaders(['x-api-key' => ..., 'anthropic-version' => ..., 'content-type' => 'application/json'])->baseUrl(...)->timeout(...)->retry($times, $delayMs)->post('/v1/messages', $payload)`. Il retry di Laravel (`retry(2, 2000)`) ritenta solo se la risposta genera un'eccezione — usiamo `->throw()` implicito passando per `Http::retry()` con condizione di default (ritenta su `ConnectionException`/errori di rete e su risposte con status di errore quando combinato con `->throw()`), così 4xx/5xx vengono comunque propagati come `RequestException` dopo i tentativi.
  - **`ClaudeClient::batch(array $payload): ClaudeResponse`:** stesso schema per l'endpoint `/v1/messages/batches` (Batch API), riusando la stessa pending request configurata da un metodo privato `pendingRequest()` per non duplicare header/retry/timeout tra i due metodi pubblici.
  - **Parsing risposta:** introdurre un piccolo DTO immutabile `App\Services\Ai\ClaudeResponse` (readonly class con costruttore promosso: `content`, `tokensIn`, `tokensOut`, `raw`) costruito da un metodo statico `fromHttpResponse(Response $response): self` che estrae `content` (dal campo `content` della risposta Anthropic), `usage.input_tokens` → `tokensIn`, `usage.output_tokens` → `tokensOut`. Questo soddisfa esplicitamente il criterio "l'uso dei token è estratto dalla risposta e restituito al chiamante" con un tipo esplicito invece di un array associativo.
  - **Gestione errori:** su risposta 4xx/5xx dopo i retry, il client lascia propagare `Illuminate\Http\Client\RequestException` (comportamento di default di Laravel con `->throw()`), così i job chiamanti (US successive di EP-004) possono catturarla e gestire fallback/logging in modo esplicito, senza swallowing silenzioso nel client.

  ---

  ## Test Strategy

  Feature test `ClaudeClientTest` basato su `Http::fake()` (nessuna chiamata di rete reale), seguendo la stessa filosofia di isolamento dei test già presenti per i resolver (`AttributeResolverTest`, `BrandResolverTest`, `GroupingResolverTest`), ma senza bisogno di `RefreshDatabase`/`RequiresDatabase` dato che il client non tocca il database.

  - Una chiamata a `messages()` invia una richiesta a `/v1/messages` con header `x-api-key` e `anthropic-version` corretti, letti da config (asserto con `Http::assertSent`).
  - Una risposta valida stub (contenente `content` e `usage.input_tokens`/`usage.output_tokens`) viene parsata correttamente in `ClaudeResponse` con `tokensIn`/`tokensOut`/`content` popolati.
  - Una risposta HTTP 4xx (es. 401/429) e una 5xx (es. 500) fatta con `Http::fake` fanno lanciare `RequestException` dal client dopo i retry configurati.
  - Il numero di tentativi effettuati su errore rispetta la configurazione (max 2 retry) — verificabile con `Http::fake` a sequenza di risposte fallite + `Http::assertSentCount`.
  - Nessuna chiave API è mai hardcodata: verificato per ispezione di codice/config, non richiede un test dedicato oltre alla lettura da `config('services.anthropic.api_key')` già coperta dagli assert sugli header.
  - Test analogo (ridotto) per `batch()` sull'endpoint `/v1/messages/batches`, per confermare che riusa la stessa configurazione di header/retry/timeout.

  Nessun lavoro UI: la spec è puramente infrastrutturale/backend (client HTTP di servizio), non è richiesta strategia e2e né mockup.

  ---

  _Plan generated via ARchetipo Planning — 2026-07-01_
tasks:
