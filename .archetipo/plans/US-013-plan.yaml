    title: Configurazione services.anthropic e .env.example
    description: Aggiungere il blocco 'anthropic' a config/services.php con api_key, model, version, base_url, timeout, retry_times, retry_delay_ms letti da env(). Documentare le stesse variabili (vuote) in .env.example.
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: ClaudeResponse DTO per content e usage token
    description: Creare App\Services\Ai\ClaudeResponse (readonly, costruttore promosso) con content, tokensIn, tokensOut, raw e factory statica fromHttpResponse(Illuminate\Http\Client\Response) che estrae content e usage.input_tokens/output_tokens dal body JSON Anthropic.
    type: Impl
    status: DONE
    ref: TASK-02
  - id: TASK-03
    title: 'ClaudeClient: pendingRequest() con header, timeout e retry'
    description: Creare App\Services\Ai\ClaudeClient con un metodo privato pendingRequest() che configura Http::withHeaders(['x-api-key', 'anthropic-version', 'content-type']), baseUrl, timeout(config('services.anthropic.timeout')) e retry(retry_times, retry_delay_ms) leggendo tutto da config('services.anthropic.*'). Nessuna chiave hardcodata.
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-03
