body: |-
  # US-028: Estrattori deterministici aggiuntivi: DN, PN, bar, tensione, watt, colore RAL + materiale esteso â€” Piano di Implementazione

  **Generato da:** Team di Planning ARchetipo
  **Data:** 2026-07-01

  ---

  ## Spec

  **Epica:** EP-003 â€” Arricchimento Deterministico
  **PrioritĂ :** MEDIUM | **Punti:** 3
  **Bloccata da:** US-010 (DONE)

  **User Story**
  Come amministratore del catalogo, voglio che dalle descrizioni vengano estratti in modo deterministico ulteriori attributi tecnici (diametro nominale DN, pressione nominale PN, pressione in bar, tensione, potenza in watt, colore RAL) e che il riconoscimento del materiale sia ampliato, cosĂ¬ da aumentare la copertura dei filtri di ricerca senza intervento manuale nĂ© costo AI.

  **Criteri di Accettazione**
  - [ ] `diametro_nominale` (`unit='DN'`) e `pressione_nominale` (`unit='PN'`) popolano `value_num` da pattern tipo `DN80`/`DN 15` e `PN10`/`PN16`
  - [ ] `colore_ral` popola `value_text` (es. `RAL9010`) e `pressione_bar` popola `value_num` in bar normalizzando `MBAR`/`MB` (Ă·1000)
  - [ ] `tensione_volt` estrae solo voltaggi plausibili (guardia contro `1V`=velocitĂ ) e `potenza_watt` scarta i suffissi di versione modello (es. `/2 W`)
  - [ ] Il dizionario `materiale` riconosce anche `ACCIAIO`, `ALLUMINIO`, `OTTONE`, `GHISA`, `BRONZO`, `MULTISTRATO`, `ABS`, `PEX` come parola intera
  - [ ] Tutti i nuovi attributi hanno `source='regex'` e rispettano la guardia di prioritĂ  fonte esistente (non sovrascrivono `ai`/`manual`); nessuna migration introdotta

  ---

  ## Technical Solution

  Estensione pura di `App\Services\Enrichment\AttributeResolver` (US-010): nessuna migration (`product_attributes` ha giĂ  `value_num`/`value_text`/`unit`/`source`), nessuna nuova classe. Si aggiungono sei metodi privati `extractXxx(string $text): ?array` registrati nel loop di `extract()`, e si allunga la costante `MATERIALS`. La persistenza continua a passare da `writeAttribute()`, che garantisce giĂ  idempotenza (`updateOrCreate` su `product_id`+`key`) e guardia di prioritĂ  fonte (non sovrascrive righe con `source` non-null diverso da `regex`). Le regex sono calibrate sui 42.614 articoli reali di `docs/data/inventario articoli.xlsx` (occorrenze verificate).

  - **`diametro_nominale` â†’ `unit='DN'`**: `/\bDN\s*(\d+)/i` (copre `DN80`, `DN 15`, `DN15-20-25` â†’ primo valore). ~1.427 occorrenze.
  - **`pressione_nominale` â†’ `unit='PN'`**: `/\bPN\s*(\d+)/i` (copre `PN10`, `PN16`). ~716 occorrenze.
  - **`colore_ral` â†’ solo `value_text`**: `/\bRAL\s*(\d{3,4})/i`, valore canonico `RAL####` (uppercase, senza spazi). ~3.351 occorrenze. Nessun `value_num`/`unit`.
  - **`pressione_bar` â†’ `unit='bar'`**: `/(\d+(?:[.,]\d+)?)\s*(MBAR|MB|BAR)\b/i` â€” l'alternanza prova `MBAR`/`MB` prima di `BAR`; se l'unitĂ  matchata Ă¨ `MBAR`/`MB` il valore Ă¨ normalizzato in bar (Ă·1000, es. `100 MBAR` â†’ 0.1). La virgola decimale Ă¨ normalizzata in punto (riuso di `toFloat()`). Su `0/100 MBAR` prende il valore adiacente all'unitĂ  (accettabile per l'MVP).
  - **`tensione_volt` â†’ `unit='V'`** (media confidenza, con guardia): whitelist di voltaggi plausibili `/\b(12|24|48|110|220|230|380|400)\s*V(?:DC|AC|~)?\b/i`. **Motivazione della guardia**: nei ventilatori `1V` significa "1 velocitĂ " e `V.S` Ă¨ "valvola sicurezza"; senza whitelist si avrebbero ~1.073 match grezzi contro ~561 puliti. Su `12-24VDC` la whitelist seleziona `24`.
  - **`potenza_watt` â†’ `unit='W'`** (media confidenza, con guardia): `/\b(\d{2,4})\s*W\b/i` con requisito minimo di 2 cifre. **Motivazione**: `/2 W` in `VPM20/25/2 W` Ă¨ un suffisso di versione modello (1 cifra â†’ scartato); i match veri (`1200W`, `500W`) restano. La `W` di `kW` non collide perchĂ© tra le cifre e la `W` c'Ă¨ sempre la `K` (es. `24KW` â†’ `24` seguito da `K`, non matcha).
  - **`materiale` (estensione dizionario)**: aggiungere alla costante `MATERIALS` esistente (`RG`, `INOX`, `PVC`, `RAME`) i codici `ACCIAIO`, `ALLUMINIO`, `OTTONE`, `GHISA`, `BRONZO`, `MULTISTRATO`, `ABS`, `PEX`. Invariati il match whole-word case-insensitive con boundary Unicode `(?<![\p{L}\p{N}])...(?![\p{L}\p{N}])` e la selezione del primo token per posizione.

  **Regressioni note da gestire (rischio principale)**: due gruppi di test US-010 in `tests/Feature/AttributeResolverTest.php` usano stringhe che i nuovi estrattori ora intercettano â€” vanno neutralizzate le **fixture** (non gli assert, che restano corretti):
  1. `test_extracts_materiale_inox` usa `CASSETTA ESTERNA DN 45 MM 610*370*210 INOX` e asserisce `written === 1`; con `diametro_nominale` diventerebbe 2. Rimuovere `DN 45 MM` dalla fixture (mantenendo `INOX`) per preservare l'intento del test.
  2. I quattro `test_does_not_extract_*` (kw, litri, pollici, materiale) usano `TUBO MULTISTRATO 16MM` come stringa senza-match e asseriscono `written === 0`; con `MULTISTRATO` ora materiale diventerebbe 1. Sostituire con una fixture realmente neutra e priva di numeri (es. `STAFFA DI FISSAGGIO UNIVERSALE`).

  ---

  ## Test Strategy

  Feature test in-memory SQLite (`RequiresDatabase` + `RefreshDatabase`), stesso pattern di `AttributeResolverTest`, con stringhe reali del catalogo. Ogni nuovo estrattore ha un caso happy path e, dove previsto dalla spec, un falso-positivo controllato. Chiusura con regression sull'intera classe di test giĂ  esistente.

  - **DN / PN**: `FILTRO GAS MTN DN80 UNI8042` â†’ `diametro_nominale=80` (`unit='DN'`); `GIUNTO COMPENSATORE AWF DN25 PN16` â†’ in una sola `resolve()` sia `diametro_nominale=25` sia `pressione_nominale=16`, entrambi `source='regex'` (caso "Dimostra").
  - **colore_ral**: `TERMOARREDO TEKNO 1200*500 ELETTRICO BIANCO RAL9010` â†’ `value_text='RAL9010'`, `value_num`/`unit` nulli.
  - **pressione_bar**: `VALVOLA DI SICUREZZA CENTRAL.VT TARAT.18BAR 1/4` â†’ `18` bar; `MANOMETRO RAD.0/100 MBAR D.80MM 3/8` â†’ `0.1` bar (normalizzazione mbar).
  - **tensione_volt**: `BOBINA ... 230V RM/NC` â†’ `230`; falso-positivo controllato `CASSA VENTILANTE ... 4M 1V EP VORTICE` â†’ nessun attributo `tensione_volt` (guardia whitelist).
  - **potenza_watt**: `RESISTENZA FLANGIATA CURVA 1200W` â†’ `1200`; falso-positivo controllato `MODULO ACQUA CALDA SANIT. VPM20/25/2 W` â†’ nessun attributo `potenza_watt`.
  - **materiale esteso**: descrizioni con `ACCIAIO`, `OTTONE`, `ALLUMINIO`, `GHISA` come parola intera â†’ `value_text` corrispondente; conferma della selezione del primo token per posizione con piĂą materiali citati.
  - **Regression fixture US-010**: aggiornare le fixture indicate nella Technical Solution e verificare che tutti i test US-010 preesistenti restino verdi.
  - **Query range ("Dimostra")**: `ProductAttribute::where('key','diametro_nominale')->whereBetween('value_num',[15,50])` e la stessa su `pressione_nominale` restituiscono esattamente i prodotti nel range.

  ---

