spec_code: US-016
body: |
  # US-016: Cache arricchimento e tetto di spesa AI configurabile — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-02

  ---

  ## Spec

  **Epic:** EP-004 — Arricchimento AI
  **Priority:** MEDIUM | **Points:** 2
  **Blocked by:** US-015 (REVIEW — all tasks DONE, safe to build on)

  **User Story**
  Come amministratore del catalogo, voglio che descrizioni identiche non vengano inviate all'AI una seconda volta e che esista un limite di spesa configurabile per batch, così da contenere i costi AI su reimport frequenti e su grandi volumi.

  **Acceptance Criteria**
  - Una cache (keyed su hash della `description_raw`) restituisce l'arricchimento precedente senza chiamare l'API
  - Il tetto di spesa per batch è configurabile tramite variabile d'ambiente
  - Quando il tetto viene raggiunto il job si ferma e logga l'evento con il costo stimato
  - Descrizioni identiche su batch diversi contano come un solo arricchimento

  ---

  ## Technical Solution

  US-014/US-015 (entrambe DONE) hanno già stabilito il flusso: `ClassificationBatchDispatcher` seleziona prodotti `enrichment_status='pending'` e li accoda in lotti da 20-50 a `ClassifyProductsBatchJob`, che chiama l'API Anthropic per l'intero lotto, valida la risposta e applica i risultati via `EnrichmentApplier`. US-016 introduce due meccanismi trasversali a questo flusso, senza alterarne la struttura:

  1. **Cache di arricchimento per hash della descrizione**, che evita di rispedire all'AI prodotti già classificati in precedenza (anche in un lotto/job diverso, anche in un reimport successivo).
  2. **Tetto di spesa configurabile**, condiviso tra tutti i job generati da una stessa esecuzione di `ClassificationBatchDispatcher::dispatch()`, che interrompe l'elaborazione quando il costo stimato lo supera.

  Entrambi si innestano in `ClassifyProductsBatchJob::handle()`, prima delle chiamate esistenti a `ClaudeClient`.

  ### 1. Cache di arricchimento (`App\Services\Enrichment\EnrichmentCache`)

  - Nuovo servizio che avvolge la facade `Cache` di Laravel (stesso pattern di `SearchService::embedQuery()`, che già usa `Cache::remember` con chiave `md5`/TTL da config), ma qui la chiave è `enrichment:classification:{sha256(description_raw)}` e il valore cacheato è la rappresentazione array di un `ClassifiedProduct` (via `resultToArray()`-style, riusando lo stesso shape già usato da `ClassifyProductsBatchJob::resultToArray()` per il logging, spostato/condiviso se utile).
  - Espone due metodi: `get(Product $product): ?ClassifiedProduct` (null = cache miss) e `put(Product $product, ClassifiedProduct $result): void`. L'hash è calcolato su `trim($product->description_raw)`; usare `description_raw` (non `description_clean`) perché è il campo esplicitamente indicato dall'AC ("hash della `description_raw`") ed è il campo sorgente stabile per un dato articolo attraverso i reimport, mentre `description_clean` è un derivato normalizzato che potrebbe cambiare logica di normalizzazione nel tempo.
  - TTL configurabile: `config('services.anthropic.enrichment_cache_ttl')` (env `ANTHROPIC_ENRICHMENT_CACHE_TTL`, default `null` = nessuna scadenza, usando `Cache::rememberForever`/`forever()` quando null, `Cache::remember` con TTL altrimenti). A differenza della cache di ricerca (query utente, natura effimera), qui il valore ha senso restare valido finché la tassonomia non cambia sostanzialmente — da qui il default "senza scadenza", coerente con l'obiettivo esplicito dell'AC di azzerare le chiamate AI sui reimport ricorrenti di articoli invariati.
  - **Innesto nel job:** in `ClassifyProductsBatchJob::handle()`, prima di costruire il prompt, partizionare `$products` in `$cached` (hit) e `$toClassify` (miss), consultando `EnrichmentCache::get()` per ciascuno. I prodotti in `$cached` vengono aggiunti direttamente a un `ValidatedClassification` risultante (nessuna chiamata API), mentre `$toClassify` segue il flusso esistente (`classifyWithRetry` + `escalateLowConfidenceResults`) ma **solo per i codici articolo non risolti dalla cache**. Dopo `classifyWithRetry`, ogni nuovo risultato valido viene scritto in cache con `EnrichmentCache::put()` prima del logging, così i prodotti classificati in questo stesso job popolano la cache per il prossimo lotto/job (AC4: "descrizioni identiche su batch diversi contano come un solo arricchimento").
  - **Deduplicazione intra-lotto:** se due prodotti nello stesso lotto hanno `description_raw` identica, il secondo trova comunque un cache hit generato dal primo — ma solo se il primo è già stato scritto in cache PRIMA che il secondo venga letto. Per evitare la doppia chiamata API anche nello stesso lotto (caso comune: articoli varianti con descrizione identica), il partizionamento cache/da-classificare deduplica anche per hash **all'interno del batch stesso** prima di costruire il prompt: si invia all'AI un solo rappresentante per hash univoco, e il risultato viene poi replicato (stesso `ClassifiedProduct`, con `codiceArticolo` sostituito) a tutti i prodotti del lotto che condividono quell'hash.
  - Se `$toClassify` risulta vuoto (tutti i prodotti del lotto erano in cache), il job salta interamente la chiamata all'API e passa direttamente al logging/applicazione dei risultati cacheati — nessuna chiamata HTTP, coerente con l'AC "reimportare un file con 1.000 articoli invariati non genera nuove chiamate API".
  - I prodotti risolti da cache producono comunque un `EnrichmentLog` (stesso step `ai_classification`, `model` valorizzato con un marcatore distinto, es. `'cache'`, `tokens_in`/`tokens_out` a `0`) così l'audit trail resta completo e coerente con `EnrichmentApplier::apply()`, che viene invocato regolarmente anche per i risultati da cache.

  ### 2. Tetto di spesa configurabile per batch (`App\Services\Enrichment\AiSpendGuard` + pricing config)

  - **Pricing per modello (`config/services.php`, blocco `anthropic`):** aggiungere `pricing` con costo per milione di token, distinto fast/smart e input/output, seguendo la convenzione a chiavi nidificate già usata per `weights`/`cache` in `config/search.php`:
    ```php
    'pricing' => [
        'model_fast' => [
            'input_per_million' => (float) env('ANTHROPIC_PRICE_FAST_INPUT', 0.80),
            'output_per_million' => (float) env('ANTHROPIC_PRICE_FAST_OUTPUT', 4.00),
        ],
        'model_smart' => [
            'input_per_million' => (float) env('ANTHROPIC_PRICE_SMART_INPUT', 3.00),
            'output_per_million' => (float) env('ANTHROPIC_PRICE_SMART_OUTPUT', 15.00),
        ],
    ],
    ```
    Documentare le stesse chiavi in `.env.example`. I default rispecchiano il pricing pubblico Anthropic per Haiku/Sonnet al momento della spec (valori indicativi, sovrascrivibili via env se cambiano).
  - **Tetto di spesa (env, non hardcoded):** `config('services.anthropic.batch_cost_cap')` (env `ANTHROPIC_BATCH_COST_CAP`, default `null` = nessun limite). Valore in USD (float), coerente con l'unità di `pricing`.
  - **`App\Services\Enrichment\AiSpendGuard` (nuovo servizio):** incapsula la logica di stima costo e tracking condiviso della spesa per una singola esecuzione di dispatch ("batch" nell'accezione dell'AC = l'insieme dei lotti generati da una chiamata a `ClassificationBatchDispatcher::dispatch()`), usando `Cache` come storage condiviso tra i job in coda (i job di uno stesso dispatch girano come processi worker separati, quindi serve uno stato condiviso esterno al singolo job — stesso principio già adottato da `SearchService`/`Cache::remember`, qui per un contatore invece che per un valore cacheato).
    - `estimateCost(string $model, int estimatedTokensIn, int $estimatedTokensOut): float` — applica il pricing configurato.
    - `spend(string $runId, float $cost): float` — incrementa atomicamente (via `Cache::lock()` + `increment`/read-modify-write, dato che gli store del progetto, es. redis, supportano `Cache::lock`) il contatore `enrichment:spend:{$runId}` e ritorna il totale aggiornato. TTL del contatore: fine giornata/24h (accumulo per run, non serve persistenza oltre la vita del dispatch).
    - `remainingBudget(string $runId): ?float` — `null` se nessun cap configurato, altrimenti `cap - speso corrente`.
    - `capExceeded(string $runId): bool` — vero se il cap è configurato e lo speso corrente lo ha già raggiunto/superato.
  - **`App\Services\Enrichment\ClassificationBatchDispatcher` (estensione mirata):** genera un `runId` (UUID via `Str::uuid()`) all'inizio di `dispatch()`, condiviso da tutti i job dispatchati in quella chiamata, e lo passa al costruttore di ogni `ClassifyProductsBatchJob` (nuovo parametro `string $runId`). Questo è l'unico modo per far condividere ai job — eseguiti da worker Horizon potenzialmente in parallelo — lo stesso tetto di spesa "per batch" richiesto dall'AC, dato che un batch nell'accezione del prodotto (un file reimportato/una passata di classificazione) genera più `ClassifyProductsBatchJob` (uno per ogni lotto di 20-50).
  - **Innesto in `ClassifyProductsBatchJob::handle()`:**
    - **Prima** di ogni chiamata `ClaudeClient::messages()` (sia nel lotto principale sia nelle escalation per-prodotto a bassa confidenza), stimare il costo della chiamata imminente con `AiSpendGuard::estimateCost()` usando una stima prudente di `tokensOut` (es. `ClassificationPromptBuilder::MAX_TOKENS` come worst-case, dato che il costo reale è noto solo a risposta ricevuta) e verificare `AiSpendGuard::capExceeded($runId)` **prima** di procedere.
    - Se il cap è già superato al momento di iniziare il lotto (controllo fatto una volta prima di `classifyWithRetry`): il job non effettua alcuna chiamata, marca tutti i prodotti rimanenti del lotto `enrichment_status='needs_review'` (stesso path di `markNeedsReview()`, riusato con un messaggio dedicato "Tetto di spesa AI raggiunto"), e logga l'evento con `Log::warning('AI batch cost cap reached', [...])` includendo `run_id`, costo stimato/speso, e cap configurato — soddisfa l'AC "quando il tetto viene raggiunto il job si ferma e logga l'evento con il costo stimato".
    - Dopo ogni chiamata effettivamente eseguita (lotto principale ed escalation), registrare la spesa reale (calcolata sui token effettivi restituiti da `ClaudeResponse`) via `AiSpendGuard::spend($runId, $costoReale)`, così il conteggio converge al costo reale mano a mano che i job procedono, e i job successivi nello stesso run vedono il budget aggiornato.
    - L'escalation per-prodotto a bassa confidenza (`escalateLowConfidenceResults`) ricontrolla il cap per ciascun prodotto prima della chiamata smart-model (più costosa): se il cap è superato a metà escalation, i prodotti non ancora escalati restano con il risultato fast-model già ottenuto (nessuna interruzione del lotto già classificato, solo blocco delle chiamate aggiuntive), loggando comunque l'evento una volta.
    - `runId` di default: se `ClassifyProductsBatchJob` viene istanziato senza `runId` esplicito (retrocompatibilità con codice/test esistenti che lo costruiscono con un solo argomento), generare un `runId` ad-hoc nel costruttore (`Str::uuid()`), così il cap resta comunque applicabile "per singolo job" quando non invocato tramite il dispatcher.
  - **Nessuna nuova tabella/migrazione:** il contatore di spesa vive in `Cache` (redis in produzione, come da `CACHE_STORE`), non nel DB — è uno stato operativo transitorio legato all'esecuzione di un run, non un dato di dominio da conservare.

  ### Riepilogo modifiche

  | File | Tipo |
  |---|---|
  | `config/services.php` | estensione blocco `anthropic` (`pricing`, `batch_cost_cap`, `enrichment_cache_ttl`) |
  | `.env.example` | nuove variabili documentate |
  | `app/Services/Enrichment/EnrichmentCache.php` | nuovo |
  | `app/Services/Enrichment/AiSpendGuard.php` | nuovo |
  | `app/Services/Enrichment/ClassificationBatchDispatcher.php` | estensione (genera/propaga `runId`) |
  | `app/Jobs/ClassifyProductsBatchJob.php` | estensione (consulta cache prima delle chiamate, applica/verifica il cap, popola la cache dopo classificazione) |

  ---

  ## Test Strategy

  Feature test con `Http::fake()` + `RefreshDatabase`/`RequiresDatabase`, stesso approccio di `ClassifyProductsBatchJobTest`. Uso di `Cache::flush()`/store `array` in test (`config()->set('cache.default', 'array')` in `setUp()`, così i test sono isolati e deterministici senza dipendere da Redis). Nessun lavoro UI: spec puramente backend, non è richiesta strategia e2e né mockup.

  - `EnrichmentCache`: `put()` seguito da `get()` sullo stesso `description_raw` ritorna lo stesso `ClassifiedProduct`; `get()` su una descrizione mai cacheata ritorna `null`; due prodotti con `description_raw` identica (anche con `codice_articolo` diverso) condividono lo stesso cache hit; una modifica di `description_raw` produce un cache miss (hash diverso).
  - `ClassifyProductsBatchJob`: un prodotto con `description_raw` già presente in cache (pre-popolata nel test) non genera alcuna chiamata HTTP (`Http::fake()` + `Http::assertNothingSent()` per quel prodotto/lotto interamente cacheato) e produce comunque un `EnrichmentLog`/applicazione via `EnrichmentApplier` coerente col risultato cacheato.
  - `ClassifyProductsBatchJob`: un lotto con due prodotti a `description_raw` identica genera una sola chiamata HTTP (payload con un solo rappresentante) e replica correttamente il risultato su entrambi i prodotti (AC4).
  - `ClassifyProductsBatchJob`: dopo una classificazione riuscita, il risultato per ciascun prodotto è presente in cache (leggibile via `EnrichmentCache::get()` con lo stesso hash), così un secondo job/dispatch con lo stesso `description_raw` non richiama l'API (simulando un "reimport", istanziando un secondo `ClassifyProductsBatchJob` per un nuovo prodotto con la stessa descrizione e verificando `Http::assertSentCount` invariato).
  - `AiSpendGuard`: `estimateCost()` calcola correttamente il costo dato pricing/token per fast e smart model; `spend()` accumula correttamente su chiamate successive con lo stesso `runId`; `remainingBudget()`/`capExceeded()` rispettano un cap configurato e ritornano rispettivamente `null`/`false` quando il cap non è configurato.
  - `ClassifyProductsBatchJob`: con `ANTHROPIC_BATCH_COST_CAP` configurato a un valore già superato (spesa pre-caricata in cache per il `runId` del job) prima dell'esecuzione, verifica che il job non effettui alcuna chiamata HTTP (`Http::assertNothingSent()`), marchi tutti i prodotti del lotto `enrichment_status='needs_review'`, e che l'evento venga loggato (`Log::spy()`/`Log::shouldReceive('warning')` con asserzione sul contenuto: costo stimato, cap).
  - `ClassifyProductsBatchJob`: con un cap configurato che permette il lotto principale ma viene superato durante l'escalation per-prodotto a bassa confidenza, verifica che l'escalation si interrompa (i prodotti successivi mantengono il risultato fast-model, non vengono ri-chiamati con modello smart) e che l'evento di cap raggiunto venga comunque loggato una sola volta.
  - `ClassificationBatchDispatcher`: verifica che tutti i `ClassifyProductsBatchJob` dispatchati in una singola chiamata a `dispatch()` condividano lo stesso `runId` (assert su `Queue::fake()` + `Queue::assertPushed` ispezionando la proprietà `runId` dei job accodati).

  ---

