body: |
  # US-011: Clustering prodotti-base tramite grouping_key — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-01

  ---

  ## Spec

  **Epic:** EP-003 — Arricchimento Deterministico
  **Priority:** HIGH | **Points:** 3

  **User Story**
  Come operatore commerciale, voglio che le varianti dello stesso articolo commerciale siano raggruppate automaticamente sotto un unico prodotto-base, così da non vedere risultati duplicati nella ricerca per ogni taglia o misura dello stesso prodotto.

  **Acceptance Criteria**
  - Varianti con stessa marca + tipo + serie generano la stessa `grouping_key` (hash normalizzato)
  - Il token taglia (es. `025`, `035`) viene escluso dal calcolo della `grouping_key`
  - Un `product_base` viene creato o riutilizzato per ogni gruppo distinto con `title` leggibile
  - Tutte le varianti del gruppo vengono associate al `product_base` tramite `product_base_id`
  - Il test di regressione verifica il caso VAILLANT VAI 8 WNI con 4 taglie

  ---

  ## Technical Solution

  Introduciamo `App\Services\Enrichment\GroupingResolver`, che segue lo stesso pattern di `BrandResolver`/`AttributeResolver` (idempotente, guardia su stato già risolto, opera su `description_clean` con fallback su `description_raw`). Il resolver normalizza la descrizione rimuovendo il token taglia, calcola una `grouping_key` deterministica, e fa `updateOrCreate` su `product_bases.grouping_key` per creare o riusare il gruppo, assegnando `product_base_id` alla variante.

  - **Normalizzazione e rimozione taglia:** riusa la stessa logica di riconoscimento serie di `AttributeResolver` (prefissi noti tipo `VAI`, pattern `PREFIX N-NNN`): il token taglia è il numero a 2-4 cifre subito dopo il trattino (es. `025` in `VAI 8-025`). Viene rimosso e sostituito da uno spazio, il resto della stringa viene maiuscolizzato, ripulito da spazi multipli e punteggiatura residua (coerente con `squeeze()` già presente in `BrandResolver`). Se non esiste un pattern serie riconosciuto, si usa l'intera `description_clean` normalizzata così com'è (nessun token da escludere) — evita falsi raggruppamenti tra prodotti eterogenei.
  - **Calcolo grouping_key:** hash deterministico (`sha1` o `md5`) di `brand_id . '|' . description-normalizzata-senza-taglia`. Includere `brand_id` nell'hash evita collisioni tra marchi diversi con stessa sigla di serie. Prodotti senza `brand_id` risolto vengono saltati (guardia, come in `BrandResolver` — il grouping richiede un brand per essere affidabile) e restano con `product_base_id = null` fino a una futura risoluzione manuale o AI (EP-004).
  - **Title leggibile:** composto da marca + descrizione normalizzata senza taglia, in Title Case (es. `Vaillant VAI 8 WNI`), stessa idea del `title` già presente in `ProductBaseFactory`.
  - **Persistenza:** `ProductBase::updateOrCreate(['grouping_key' => $key], ['title' => $title, 'brand_id' => $product->brand_id])`, poi `$product->fill(['product_base_id' => $base->id, 'grouping_key' => $key])->save()` — il campo `grouping_key` già presente su `products` (migrazione esistente) viene valorizzato per audit/debug, oltre al nuovo collegamento su `product_bases`.
  - **Guardia idempotenza:** se `product->product_base_id` è già valorizzato, no-op (stesso pattern di `BrandResolver::resolve()`).

  ---

  ## Test Strategy

  Feature test `GroupingResolverTest` (RefreshDatabase + RequiresDatabase, stesso pattern di `AttributeResolverTest`/`BrandResolverTest`), in sqlite in-memory.

  - Due varianti con stessa marca + tipo + serie ma taglia diversa producono la stessa `grouping_key` e vengono associate allo stesso `product_base`.
  - Il token taglia (`025`, `035`, `050`, `065`) non compare nella `grouping_key`/`title` risultante.
  - Un secondo gruppo con marca o serie diversa produce un `product_base` distinto (nessun raggruppamento errato).
  - Rieseguire il resolver su un prodotto già assegnato non crea un secondo `product_base` (idempotenza) né duplica righe.
  - Un prodotto senza `brand_id` risolto viene lasciato con `product_base_id = null` (guardia).
  - Test di regressione esplicito: le 4 varianti `VAI 8-025/035/050/065 WNI VAILLANT` condividono lo stesso `product_base_id` e il `product_base.title` è leggibile (marca + tipo + serie).

  Nessun lavoro UI: la spec è puramente di dominio/backend, non è richiesta strategia e2e né mockup.

  ---

