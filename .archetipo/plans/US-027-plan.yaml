spec_code: US-027
body: |
  # US-027: Scheduler per reimport automatico e job notturno embedding — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-02

  ---

  ## Spec

  **Epic:** EP-008 — Comandi e Scheduling
  **Priority:** LOW | **Points:** 2

  **User Story**
  Come amministratore del catalogo, voglio che il sistema verifichi periodicamente se il file gestionale è cambiato e avvii automaticamente un reimport, così da mantenere il catalogo aggiornato senza intervento manuale.

  **Acceptance Criteria**
  - Lo scheduler controlla il file sorgente e avvia l'import solo se l'hash è cambiato rispetto all'ultimo batch completato
  - Un job notturno genera gli embedding per i prodotti-base senza vettore
  - La frequenza di controllo è configurabile tramite variabile d'ambiente
  - I log dello scheduler registrano le esecuzioni senza produrre rumore quando non ci sono modifiche

  ---

  ## Technical Solution

  Questa spec non introduce nuova logica di dominio: riusa i building block già presenti da US-007/US-008/US-026 (`ImportBatchService::startImport()` con dedup by-hash via `DuplicateImportException`, e `catalog:embed --missing`) e li aggancia allo scheduler nativo di Laravel 13 (`withSchedule()` in `bootstrap/app.php`, niente `Kernel` da modificare). Il lavoro è quindi principalmente: un nuovo comando artisan idempotente che wrappa `startImport()` trattando il "nessuna modifica" come esito silenzioso, una nuova voce di configurazione per path sorgente e frequenza, e la registrazione dei due task schedulati.

  - **Nuovo comando `catalog:import-if-changed`** (`App\Console\Commands\CatalogImportIfChangedCommand`): legge il path del file gestionale da `config('catalog.watch_path')`, richiama `ImportBatchService::startImport($path)` e avvia la stessa `Bus::chain([ImportXlsxJob, PromoteStagingToProductsJob])` già usata da `CatalogImportCommand`. Se il file non esiste (nessun export ancora presente) esce con successo senza log, per non generare rumore all'avvio dell'ambiente. Se `startImport()` lancia `DuplicateImportException` (hash invariato rispetto all'ultimo batch completato — logica già in `ImportBatchService::startImport()`), il comando esce con successo senza scrivere alcun log: questo soddisfa l'AC "nessun rumore quando non ci sono modifiche". Solo quando un nuovo batch viene effettivamente creato o quando si verifica un errore il comando scrive una riga di log (`Log::info`/`Log::error`) con l'id batch/il messaggio d'errore.
  - **Nuova config `config/catalog.php`** (pattern analogo a `config/search.php`): `watch_path` (env `CATALOG_WATCH_PATH`, default `storage_path('import/catalogo.xlsx')`) e `schedule_frequency_minutes` (env `CATALOG_SCHEDULE_FREQUENCY_MINUTES`, default 15) — questo soddisfa l'AC "frequenza configurabile tramite variabile d'ambiente" senza hardcodare `->everyFifteenMinutes()`.
  - **Registrazione schedulazione** in `bootstrap/app.php` via `->withSchedule(function (Schedule $schedule) { ... })` (idiomatico in Laravel 13, evita di sporcare `routes/console.php` con logica): `$schedule->command('catalog:import-if-changed')->cron('*/'.config('catalog.schedule_frequency_minutes').' * * * *')->withoutOverlapping()` e `$schedule->command('catalog:embed', ['--missing' => true])->daily()->withoutOverlapping()` per il job notturno di embedding (riuso diretto del comando US-026, nessuna nuova classe necessaria). `withoutOverlapping()` previene sovrapposizioni se un import precedente è ancora in corso quando scatta il ciclo successivo.
  - Nessuna migrazione, nessun nuovo modello: l'hash-check è già delegato a `ImportBatchService`, quindi lo scheduler resta un thin trigger. Il file sorgente da monitorare (`storage/import/`) è una directory distinta dagli upload ad-hoc di `ImportCatalog.php` (che scrivono in `storage/app/local/imports/` via Filament) — va creata/documentata solo come convenzione di path, non richiede nuovo storage disk.

  ---

  ## Test Strategy

  Test a livello di Feature, senza introdurre e2e (nessuna UI coinvolta). Focus su: comportamento idempotente del comando, silenziosità dei log quando non cambia nulla, propagazione dell'errore, e corretta registrazione dei task nello scheduler.

  - `catalog:import-if-changed` con file assente: exit SUCCESS, nessun batch creato, nessuna entry di log.
  - `catalog:import-if-changed` con file nuovo (hash mai visto): crea un `ImportBatch`, dispatcha la chain (`Queue::fake()` per isolare), scrive un log informativo con l'id del batch.
  - `catalog:import-if-changed` rieseguito sullo stesso file dopo un batch `Completed` con hash identico: nessun nuovo batch, exit SUCCESS, **nessuna riga di log scritta** (asserzione chiave dell'AC "log senza rumore" — usare `Log::shouldReceive()->never()` o spy equivalente already-used pattern nel progetto, altrimenti `Log::spy()`).
  - `catalog:import-if-changed` con `ImportBatchService::startImport()` che lancia un'eccezione non gestita (es. file non leggibile a metà lettura): il comando la logga come errore ed esce con FAILURE.
  - Test di configurazione: `config('catalog.watch_path')` e `config('catalog.schedule_frequency_minutes')` risolvono i default attesi e rispettano l'override da env (`Config::set` + assert, o test dedicato tipo `CatalogTaxonomySchemaTest` già presente per altre config).
  - Test sulla registrazione schedulata: verificare tramite `Artisan::call('schedule:list')` (o ispezionando `app(Schedule::class)->events()`) che `catalog:import-if-changed` e `catalog:embed --missing` risultino registrati con la frequenza attesa — evita regressioni silenziose se `bootstrap/app.php` viene toccato in futuro.

  ---

  _Plan generated via ARchetipo Planning — 2026-07-02_
