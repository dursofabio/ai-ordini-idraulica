spec_code: US-034
body: |
  # US-034: Provider AI alternativo via OpenRouter con modello gratuito/economico — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-02

  ---

  ## Spec

  **Epic:** EP-004 — Arricchimento AI
  **Priority:** MEDIUM | **Points:** 5

  **User Story**
  Come sviluppatore del team, voglio poter configurare OpenRouter come provider AI alternativo per le chiamate di arricchimento, con un modello gratuito o molto economico, così da poter ridurre o azzerare i costi di classificazione AI su ambienti di test o su cataloghi meno critici, senza modificare il codice dei job.

  **Acceptance Criteria**
  - Le chiamate di classificazione AI passano attraverso un'astrazione comune, implementata sia dal client Claude esistente sia da un nuovo client OpenRouter, così da poter cambiare provider senza toccare il codice del job
  - Il provider attivo è selezionato tramite la variabile d'ambiente `AI_PROVIDER` (`anthropic` di default, `openrouter` come alternativa)
  - Il client OpenRouter legge endpoint, modello e chiave API da `config('services.openrouter.*')`, con un modello gratuito o molto economico configurabile come default e nessun valore hardcodato nel codice
  - Il client OpenRouter restituisce contenuto e token utilizzati (`tokens_in`, `tokens_out`) nello stesso formato già prodotto dal client Claude
  - Il comportamento su errore o risposta non valida resta quello già previsto (retry configurabile, poi `needs_review`), senza fallback automatico verso un altro provider
  - Un test con mock HTTP verifica che il job di classificazione produca lo stesso output strutturato sia con provider `anthropic` sia con provider `openrouter`

  ---

  ## Technical Solution

  Introduciamo un'interfaccia comune `App\Services\Ai\AiClient` (namespace esistente, nessuna nuova cartella) che astrae le sole operazioni di cui `ClassifyProductsBatchJob` ha bisogno oggi: inviare una richiesta di classificazione e conoscere quale modello usare per il batch e per l'escalation a bassa confidenza. `ClaudeClient` (US-013) e il nuovo `OpenRouterClient` implementano entrambi questa interfaccia; il job dipende solo dall'interfaccia, mai dalle classi concrete, così il cambio di provider non tocca `ClassifyProductsBatchJob`.

  - **`App\Services\Ai\AiClient` (nuova interfaccia):** tre metodi — `messages(array $payload): ClaudeResponse`, `modelFast(): string`, `modelSmart(): string`. `messages()` copre l'unica chiamata usata dal job (la Batch API di Anthropic resta un metodo extra solo su `ClaudeClient`, non nell'interfaccia, perché OpenRouter non ha un equivalente e nessun AC la richiede per questa spec). `modelFast()`/`modelSmart()` esistono perché oggi il job legge `config('services.anthropic.model_fast'/'model_smart')` direttamente: senza questi metodi, selezionare `AI_PROVIDER=openrouter` lascerebbe comunque il job a costruire il payload con un nome-modello Anthropic, vanificando l'astrazione. `ClaudeClient` implementa i due metodi restituendo `config('services.anthropic.model_fast')`/`model_smart`; `OpenRouterClient` restituisce `config('services.openrouter.model')` per entrambi, dato che l'AC descrive un solo modello configurabile per OpenRouter, non una coppia fast/smart — l'escalation per bassa confidenza userà quindi lo stesso modello anche in caso di rerun (comportamento accettabile per un provider pensato per costi bassi/nulli).
  - **`App\Services\Ai\OpenRouterClient` (nuova classe):** stessa struttura di `ClaudeClient` — un metodo privato `pendingRequest()` che configura `Http::withHeaders(['Authorization' => 'Bearer '.config('services.openrouter.api_key'), 'content-type' => 'application/json'])->baseUrl(...)->timeout(...)->retry(retry_times, retry_delay_ms)` leggendo tutto da `config('services.openrouter.*')`, nessun valore hardcodato. `messages()` esegue `POST /chat/completions` (endpoint OpenAI-compatible di OpenRouter) con lo stesso `$payload` già costruito da `ClassificationPromptBuilder` (`model`, `max_tokens`, `messages: [{role, content}]`) — il formato è già compatibile tra le due API per il caso d'uso attuale (un solo messaggio utente, nessun blocco di sistema), quindi non serve tradurre la richiesta, solo la risposta. Il comportamento su errore è identico a `ClaudeClient`: `Http::retry()` con il quarto parametro `$throw` di default `true` propaga `Illuminate\Http\Client\RequestException` dopo i tentativi configurati, senza fallback automatico verso un altro provider (AC esplicito).
  - **`App\Services\Ai\ClaudeResponse` (estensione, non nuova classe):** manteniamo questo DTO come formato di ritorno condiviso tra i due client — è esattamente quanto richiesto dall'AC ("stesso formato già prodotto dal client Claude") ed evita una rinomina invasiva (il tipo è già usato da validator, job e test esistenti). Aggiungiamo una seconda factory statica `fromOpenRouterResponse(Response $response): self` che estrae `choices[0].message.content` per `content` e `usage.prompt_tokens`/`usage.completion_tokens` per `tokensIn`/`tokensOut` (schema di risposta OpenAI-compatible), mantenendo `fromHttpResponse()` invariato per Anthropic.
  - **Configurazione (`config/services.php`):** aggiungere `'ai_provider' => env('AI_PROVIDER', 'anthropic')` a livello root (accanto al blocco `anthropic`) e un nuovo blocco `'openrouter' => ['api_key' => env('OPENROUTER_API_KEY'), 'model' => env('OPENROUTER_MODEL', 'meta-llama/llama-3.3-70b-instruct:free'), 'base_url' => env('OPENROUTER_BASE_URL', 'https://openrouter.ai/api/v1'), 'timeout' => env('OPENROUTER_TIMEOUT', 120), 'retry_times' => env('OPENROUTER_RETRY_TIMES', 2), 'retry_delay_ms' => env('OPENROUTER_RETRY_DELAY_MS', 2000)]`. **Assunzione aperta:** il default `meta-llama/llama-3.3-70b-instruct:free` è un identificatore plausibile del catalogo gratuito OpenRouter al momento della stesura di questo piano, ma il catalogo dei modelli gratuiti cambia nel tempo — va verificato/aggiornato dallo sviluppatore prima del rilascio, senza bisogno di modificare codice (solo `.env`/default di config). Aggiungere le stesse variabili (vuote) a `.env.example`, incluse `AI_PROVIDER=`.
  - **Binding del provider (`App\Providers\AppServiceProvider::register()`):** `$this->app->bind(AiClient::class, fn () => match (config('services.ai_provider')) { 'openrouter' => new OpenRouterClient, default => new ClaudeClient });`. Un valore non riconosciuto di `AI_PROVIDER` ricade su Claude (default sicuro), senza eccezioni — coerente con l'AC che descrive solo due valori validi senza menzionare validazione esplicita.
  - **`App\Jobs\ClassifyProductsBatchJob` (modifica mirata, non riscrittura):** il type-hint del client passa da `ClaudeClient` ad `AiClient` in `handle()`, `classifyWithRetry()` ed `escalateLowConfidenceResults()` (Laravel risolve `AiClient` tramite il binding sopra quando il job viene dispatchato in coda). `$modelFast = (string) config('services.anthropic.model_fast')` diventa `$modelFast = $client->modelFast()`; analogamente `$modelSmart` dentro `escalateLowConfidenceResults()` diventa `$client->modelSmart()`. `markNeedsReview()` e `handleCapExceeded()` oggi rileggono `config('services.anthropic.model_fast')` internamente per popolare la colonna `model` di `EnrichmentLog` in caso di `needs_review`: entrambi i metodi ricevono un nuovo parametro `string $modelFast`, valorizzato dalla variabile già calcolata in `handle()`, invece di richiamare `config()` con un namespace hardcodato ad Anthropic.
  - **`App\Services\Enrichment\AiSpendGuard` (nessuna modifica):** resta legato a `config('services.anthropic.pricing'/'batch_cost_cap')`. Per il provider OpenRouter, `estimateCost()` restituirà 0.0 (il nome-modello OpenRouter non corrisponde a nessun ruolo di pricing Anthropic) e il tetto di spesa condiviso resta quello configurato per Anthropic. Nessun AC richiede tracciamento di costo per OpenRouter — coerente con l'obiettivo della spec di azzerare i costi — quindi si documenta questa scelta come limite noto piuttosto che estendere il servizio.

  ---

  ## Test Strategy

  Stessa filosofia di isolamento di `ClaudeClientTest`/`ClassifyProductsBatchJobTest`: `Http::fake()` per ogni chiamata esterna, nessuna rete reale.

  - Nuovo `OpenRouterClientTest` (mirror di `ClaudeClientTest`): `messages()` invia l'header `Authorization: Bearer <api_key>` letto da config verso `{base_url}/chat/completions`; una risposta valida stub (`choices[0].message.content` + `usage.prompt_tokens`/`completion_tokens`) viene parsata in `ClaudeResponse` con `content`/`tokensIn`/`tokensOut` popolati; una risposta 4xx/5xx fa propagare `RequestException` dopo i retry configurati (verificato con `Http::assertSentCount`); `modelFast()` e `modelSmart()` restituiscono entrambi `config('services.openrouter.model')`.
  - Estensione di `ClassifyProductsBatchJobTest` con due test che fanno girare lo stesso `ClassifyProductsBatchJob::handle()` una volta con `app(AiClient::class)` risolto su `ClaudeClient` (config `services.ai_provider = anthropic`, risposta stub in formato Anthropic) e una volta risolto su `OpenRouterClient` (config `services.ai_provider = openrouter`, risposta stub in formato OpenRouter), verificando che in entrambi i casi risulti lo stesso numero di `EnrichmentLog` con la stessa struttura (`brand`/`family`/`subfamily`/`product_type`/`enriched_description`/`confidence` uguali), a parità di corpo-risposta logicamente equivalente nei due formati — l'unica differenza attesa è il campo `model` registrato.
  - Regressione: rieseguire `ClaudeClientTest` e `ClassifyProductsBatchJobTest` esistenti per confermare che il refactor del type-hint (`ClaudeClient` → `AiClient`) e il threading del parametro `modelFast` in `markNeedsReview`/`handleCapExceeded` non abbiano alterato il comportamento già coperto (US-014/US-015/US-016), dato che i test passano già istanze concrete (`app(ClaudeClient::class)`) che restano compatibili con il nuovo type-hint a interfaccia.

  Nessun lavoro UI: la spec è puramente infrastrutturale/backend (nuovo client HTTP + astrazione di provider), non è richiesta strategia e2e né mockup.

  ---

  _Plan generated via ARchetipo Planning — 2026-07-02_
