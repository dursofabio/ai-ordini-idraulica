schema: archetipo/plan/v2
spec_code: US-048
body: |
  ## Soluzione Tecnica

  Questa spec dipende (`Bloccata da`) da US-042 (registro `attribute_definitions` + `AttributeUnitConverter`/`UnknownAttributeUnitException`), oggi in stato PLANNED ma non ancora implementata nel codice — non esiste nessuna tabella `attribute_definitions` né un `AttributeUnitConverter` in `app/Services/Enrichment/`. Questo piano è quindi scritto assumendo che, all'atto dell'implementazione, US-042 sia già stata eseguita (come impone `blocked_by`): tutte le classi di US-042 citate sotto sono trattate come dipendenze esterne già disponibili, non da ricreare qui. US-047 (ricerca flat a livello di `Product`, `SearchService`/`SearchResult` riscritti) è già implementata ed è la base su cui si innesta il filtro rigido.

  Il funnel deciso nell'handoff (`docs/handoff-normalizzazione-ricerca-ai.md`, punto 6) è: parser AI → filtro rigido sugli attributi estratti → ranking semantico solo sul testo residuo. Per rispettare il principio “minimo disturbo” sui componenti condivisi, `SearchService` (già coperto da 5 file di test in `tests/Feature/SearchService*Test.php`, tutti scritti assumendo che una ricerca testuale non generi mai una chiamata AI) **non viene modificato**: resta il motore di ranking/filtro puro esistente. Il parsing NL vive in un nuovo strato di orchestrazione sopra `SearchService`, così i test esistenti restano validi senza dover fakeare un client AI ovunque.

  - **Registro come vocabolario chiuso — `App\Services\Ai\AttributeDefinitionCatalog`**: nuova classe gemella di `TaxonomyCatalog` (stesso pattern: collection memoizzata, niente ri-query). Espone `toPromptText(): string` (rende `key`, `data_type`, `canonical_unit`, `accepted_units`, `description` per ogni riga di `attribute_definitions`, in un formato leggibile dal modello) e `find(string $key): ?AttributeDefinition` (case-insensitive, trim, usato dal validator per il controllo “chiave a registro sì/no”).
  - **Parsing della query — `App\Services\Ai\QueryParsePromptBuilder`**: costruisce il payload Messages-API (stesso schema di `ClassificationPromptBuilder::build()`: `model`/`max_tokens`/`messages`), incorporando `AttributeDefinitionCatalog::toPromptText()` e il testo della query. Il prompt istruisce il modello a restituire ESCLUSIVAMENTE JSON `{"recognized_text": string, "attributes": [{"key": string, "value_num"?: number, "value_text"?: string, "unit"?: string, "min"?: number, "max"?: number}]}`, con l'istruzione esplicita di usare solo chiavi del registro e di lasciare nel testo (`recognized_text`) qualunque menzione tecnica non riconducibile con certezza a una chiave nota (AC3: “nessun filtro inventato”). Il modello riporta valore+unità così come letti nel testo, mai già convertiti — la conversione resta un passo deterministico lato applicazione, stesso principio di US-043.
  - **Validazione e conversione — `App\Services\Ai\QueryParseResponseValidator`** (+ nuova `App\Exceptions\InvalidQueryParseResponseException`): decodifica il JSON (stesso `stripMarkdownFences` di `ClassificationResponseValidator`), poi per ogni attributo proposto: se la chiave non è nel registro (`AttributeDefinitionCatalog::find()` restituisce null) lo scarta silenziosamente (nessun errore, nessun filtro: resta implicitamente parte del testo semantico); se la chiave è nota e numerica, converte value/min/max in unità canonica via `AttributeUnitConverter::convertToCanonical()` (US-042), scartando solo quel singolo attributo (con log di warning) se l'unità non è convertibile (`UnknownAttributeUnitException`) invece di far fallire l'intero parsing; se la chiave è testuale, mantiene il valore come match esatto case-insensitive (stesso contratto di `SearchService::applyAttributeConstraint()`). Un JSON sintatticamente non valido o privo di `recognized_text` lancia `InvalidQueryParseResponseException` (il chiamante decide il fallback). L'esito valido è un `App\Services\Search\ParsedSearchQuery` (readonly: `recognizedText`, `array<AppliedAttributeFilter> $appliedFilters`), con un costruttore statico `wholeTextFallback(string $query)` (nessun filtro, `recognizedText = $query`) riusato sia per gli errori di parsing sia per il parsing disattivato. `App\Services\Search\AppliedAttributeFilter` (readonly: `key`, `label` — dalla `description` del registro —, `unit`, `value?`, `min?`, `max?`) espone `toSearchFilterArray(): array` (stessa forma già accettata da `SearchService`'s `filters['attributes']`) e `toDisplayLabel(): string` per l'interpretazione mostrata in pagina.
  - **Orchestrazione e cache — `App\Services\Search\QueryParser`**: `parse(string $query): ParsedSearchQuery` è il solo punto che chiama l'AI. Ordine dei controlli: (1) query vuota → `wholeTextFallback('')` senza alcuna chiamata; (2) `config('search.natural_language.enabled') === false` → `wholeTextFallback($query)` senza alcuna chiamata (interruttore per ambienti senza credenziali AI, vedi sotto); (3) cache hit (`Cache::remember('search:query-parse:'.md5($query), config('search.natural_language.cache_ttl'), ...)`, stesso pattern di `SearchService::embedQuery()`); (4) altrimenti costruisce il prompt, chiama `AiClient::messages()` con `AiClient::modelFast()` (stesso modello economico usato per la classificazione bulk), valida la risposta. Qualunque eccezione (HTTP, `InvalidQueryParseResponseException`, `UnknownAttributeUnitException` non catturata a valle) viene loggata come warning e fa cadere sul fallback a tutto-testo: un guasto del parser non deve mai rompere la ricerca, coerente con AC3.
  - **Composizione con `SearchService` — `App\Services\Search\NaturalLanguageSearchResult` + `App\Services\Search\NaturalLanguageSearchService`**: nuovo livello sottile, iniettato con `QueryParser` e `SearchService`. `search()`/`paginate()` chiamano `QueryParser::parse($query)`, fondono `appliedFilters` (mappati con `toSearchFilterArray()`) dentro `filters['attributes']` accanto agli eventuali filtri già espliciti della pagina (marca/famiglia/sottofamiglia/i tre filtri numerici fissi già esistenti: nessun conflitto, `SearchService::applyFilters()` applica già più vincoli attributo in AND), poi delega a `SearchService::search()`/`paginate()` passando `parsed->recognizedText` (non la query grezza) come testo per il ranking — la query grezza resta quella vista da `SearchService::findExactCodeMatchProductId()`, che opera internamente sul parametro `$query` invariato. Il risultato è avvolto in `NaturalLanguageSearchResult` (readonly: `ParsedSearchQuery $interpretation`, `Collection|LengthAwarePaginator $results`), che è il contratto esposto sia alla pagina Filament sia a un'eventuale consumazione futura (non esiste un'API HTTP in questo progetto: “API” nell'AC corrisponde a questo DTO di servizio, stesso significato già usato nell'handoff di US-047).
  - **Pagina `App\Filament\Pages\ProductSearch`**: `searchResults()` passa da `SearchService::paginate()` a `NaturalLanguageSearchService::paginate()`; `search()` valorizza una nuova proprietà pubblica `?ParsedSearchQuery $interpretation`. La vista `resources/views/filament/pages/product-search.blade.php` aggiunge un banner (visibile solo quando `hasSearched` e la query non è vuota) con “Tipo riconosciuto: {recognizedText}” e una chip per ciascun `AppliedAttributeFilter::toDisplayLabel()` — nessun filtro noto → il banner mostra solo il testo riconosciuto, senza chip, senza inventare nulla.
  - **Interruttore di ambiente**: `config/search.php` guadagna una sezione `'natural_language' => ['enabled' => env('SEARCH_NL_PARSING_ENABLED', true), 'cache_ttl' => env('SEARCH_QUERY_PARSE_CACHE_TTL', 3600)]` (+ voci gemelle in `.env.example`). `.env.dusk.local` imposta `SEARCH_NL_PARSING_ENABLED=false`: esattamente come `DB_CONNECTION=sqlite` fa già prendere a `SearchService` il ramo senza embedding provider in Dusk (vedi docblock di `tests/Browser/ProductSearchTest.php`), questo evita che i test browser scatenino una vera chiamata AI in un ambiente privo di API key.
  - **Fuori scope esplicito**: nessun margine di confidenza top1/top2 né disambiguazione automatica (US-049, bloccata da questa spec); nessuna modifica a `SearchService`/`SearchResult`; nessuna nuova estrazione regex; nessuna modifica alla pipeline di classificazione batch (US-043) — questa spec legge il registro, non lo alimenta.

  ## Strategia di Test

  La suite esistente di `SearchService` (5 file in `tests/Feature/SearchService*Test.php`) non viene toccata: è la prova di non-regressione che il motore di ranking/filtro puro resta invariato. Tutti i nuovi componenti sono coperti a livello `Feature` con `Http::fake()` per isolare sia il client AI sia il provider di embedding, seguendo lo stesso pattern di `SearchServiceEmbeddingCacheTest`/`ClassificationResponseValidatorTest`.

  - `tests/Feature/AttributeDefinitionCatalogTest.php`: `toPromptText()` include chiave/tipo/unità/descrizione attese; `find()` case-insensitive e con trim; registro vuoto produce un testo comunque valido (non un errore).
  - `tests/Feature/QueryParsePromptBuilderTest.php`: il prompt costruito contiene il vocabolario del registro, il testo della query e le istruzioni di schema JSON/di non-invenzione.
  - `tests/Feature/QueryParseResponseValidatorTest.php`: attributo numerico noto con unità non canonica → filtro con valore convertito; attributo testuale noto → filtro a match esatto; chiave fuori registro → scartata senza eccezione; unità non convertibile → solo quell'attributo scartato (log di warning), parsing altrimenti valido; JSON malformato o senza `recognized_text` → `InvalidQueryParseResponseException`.
  - `tests/Feature/QueryParserTest.php`: query ripetuta riusa la cache (una sola chiamata HTTP fake, stesso schema di asserzione di `SearchServiceEmbeddingCacheTest`); `search.natural_language.enabled = false` → zero chiamate HTTP e fallback a tutto-testo; eccezione lato AI → fallback a tutto-testo senza propagare l'errore; una risposta AI realistica (“tubo inox 1 pollice”) produce `ParsedSearchQuery` con `attacco_pollici` convertito in unità canonica.
  - `tests/Feature/NaturalLanguageSearchServiceTest.php`: scenario cardine della demo — un prodotto con l'attributo estratto (es. `attacco_pollici = 1`) e uno con valore diverso ma testo simile: solo il primo sopravvive al filtro rigido, il ranking testuale opera sul solo `recognized_text`; `interpretation` esposta con testo riconosciuto e filtri applicati con etichetta; i filtri già espliciti della pagina (marca/famiglia/range numerici fissi) si combinano in AND con quelli estratti dalla query senza conflitti; con parser disattivato o AI fallita il comportamento degrada a ricerca full-text pura (nessuna regressione rispetto a US-047).
  - `tests/Feature/ProductSearchPageTest.php` (esteso): fake della risposta AI per una query con attributo esplicito, verifica che il banner di interpretazione compaia con il testo riconosciuto e i filtri applicati e che la tabella risultati sia ristretta di conseguenza; verifica il degrado a ricerca full-text con AI fakeata a fallire.
  - `tests/Browser/ProductSearchTest.php` (esteso, Dusk — unico framework e2e presente nel progetto, già usato in US-033/041 con screenshot per-step in `docs/test-results/`, Dusk non registra video in questo progetto): nuovo scenario che apre “Ricerca prodotti” con `SEARCH_NL_PARSING_ENABLED=false` (coerente con `.env.dusk.local`) e verifica che la pagina continui a funzionare end-to-end (banner assente/testo semplice, tabella risultati invariata) — il percorso con parsing AI realmente attivo non viene esercitato nel browser (nessuna chiamata di rete reale in e2e, stessa ragione per cui Dusk gira già su SQLite per evitare il provider di embedding): la copertura funzionale del parsing AI e del banner resta a carico di `ProductSearchPageTest`, che può fakeare l'HTTP in-process. Screenshot per-step salvati in `docs/test-results/US-048/`.
  - Regressione finale: rieseguire l'intera suite `SearchService*Test.php`, `ProductSearchPageTest`, `ProductSearchTest` (Dusk) e `vendor/bin/sail bin pint --dirty` sui file toccati.
