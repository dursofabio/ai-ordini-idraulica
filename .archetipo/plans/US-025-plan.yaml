    title: Creare AiCostWidget
    description: Widget StatsOverviewWidget che individua il gruppo di EnrichmentLog con created_at massimo (ultimo batch inserito), somma tokens_in/tokens_out per model, e usa AiSpendGuard::estimateCost() per calcolare il costo stimato in USD mostrato come Stat.
