    status: DONE
    ref: TASK-03
  - id: TASK-04
    title: Test EnrichmentStatusWidget
    description: Feature test che verifica il conteggio corretto per stato con prodotti factory in stati misti (pending, enriched, needs_review, done) e il caso di un solo stato presente.
    type: Test
    status: DONE
    dependencies:
