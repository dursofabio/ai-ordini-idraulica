    description: Verificare/estendere AdminPanelProvider affinchĆ© i quattro widget siano montati sulla Dashboard di default (discoverWidgets giĆ  configurato; aggiungere test di integrazione che la pagina /admin monta tutti i widget senza errori per un utente autenticato).
    type: Impl
