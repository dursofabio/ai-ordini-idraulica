schema: archetipo/plan/v2
spec_code: US-050
body: |-
  ## Soluzione Tecnica

  La spec aggiunge un campo descrittivo puro, senza alcun impatto sulla pipeline di arricchimento/embedding: una colonna `TEXT` nullable su `products`, un `MarkdownEditor` nella pagina di edit e una sezione dedicata con rendering markdown nella pagina di dettaglio. Tutto su componenti nativi Filament v5, seguendo le convenzioni già presenti in `ProductForm`/`ProductInfolist`.

  - **Migrazione — `add_descrizione_estesa_to_products_table`**: colonna `descrizione_estesa` di tipo `text`, `nullable`, senza default e senza indici (campo descrittivo, non partecipa alla ricerca in questa spec). Creata con `vendor/bin/sail artisan make:migration`.
  - **Modello `Product`**: aggiungere `'descrizione_estesa'` all'attributo `#[Fillable]`. Nessun cast necessario (testo semplice). `ProductObserver` dispatcha `GenerateProductEmbeddingJob` solo su `wasChanged(['product_type', 'description_clean', 'brand_id'])`, quindi il salvataggio della descrizione estesa non rigenera embedding né innesca job: nessuna modifica all'observer, ma il comportamento va blindato con un test esplicito.
  - **`ProductForm`**: `MarkdownEditor::make('descrizione_estesa')->label('Descrizione estesa')->columnSpanFull()` con `toolbarButtons()` personalizzati **senza** `attachFiles`: l'upload immagini dell'editor scrive su storage pubblico, non è richiesto dagli AC e va escluso finché non esiste una policy per gli allegati.
  - **`ProductInfolist`**: nuova `Section::make('Descrizione estesa')` subito dopo la sezione 'Prodotto', con `TextEntry::make('descrizione_estesa')->hiddenLabel()->markdown()->placeholder('—')->columnSpanFull()`. Il rendering markdown di `TextEntry` sanitizza l'HTML in output (protezione XSS integrata di Filament). Campo vuoto → placeholder '—', stessa convenzione già usata nelle altre entry dell'infolist (AC4: nessun contenuto fittizio, nessun errore).
  - **Fuori scope esplicito**: generazione AI della descrizione (spec successive di EP-004); inclusione del campo in `search_vector`/embedding/ricerca; colonna descrizione estesa nella tabella prodotti.

  ## Strategia di Test

  Tutti i test estendono suite esistenti (stessi file, nuovi metodi), tranne lo scenario Dusk che è un nuovo file. Nessun test esistente viene modificato nel comportamento.

  - Estendere `tests/Feature/ProductCatalogSchemaTest.php`: la colonna `descrizione_estesa` esiste ed è nullable; il campo è fillable sul modello.
  - Estendere `tests/Feature/ProductResourceTest.php`: la edit page salva il campo (`fillForm` + `call('save')` + `assertDatabaseHas`); campo lasciato vuoto → nessun errore di validazione e `null` persistito.
  - Estendere `tests/Feature/ProductResourceViewTest.php`: la view page renderizza il markdown come HTML (es. `**grassetto**` → `<strong>`); prodotto con campo vuoto → placeholder senza errori; con `Queue::fake()`, l'update del solo campo `descrizione_estesa` non dispatcha `GenerateProductEmbeddingJob`.

  ### Test E2E — Simulazione Utente

  **Framework:** Laravel Dusk (unico framework e2e del progetto, gira su SQLite). Dusk non supporta la registrazione video nativa: come da convenzione del progetto, ogni scenario produce screenshot per-step salvati in `docs/test-results/US-050/` come artefatti visivi della run.

  | Scenario | Flusso utente |
  |---|---|
  | Modifica e visualizzazione della descrizione estesa | L'operatore fa login, apre la pagina di edit di un prodotto, compila l'editor markdown con testo formattato (titolo, grassetto, elenco puntato), salva, apre la pagina di dettaglio e vede la descrizione renderizzata come HTML nella sezione dedicata |
  | Prodotto senza descrizione estesa | L'operatore apre la pagina di dettaglio di un prodotto con campo vuoto e vede la sezione con il placeholder, senza contenuto fittizio né errori |

  _Piano generato via ARchetipo Planning._
