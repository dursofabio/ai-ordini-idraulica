schema: archetipo/plan/v2
spec_code: US-043
body: |-
  ## Soluzione Tecnica

  L'estrazione degli attributi tecnici passa esclusivamente dalla classificazione AI, ancorata al vocabolario globale del registro `attribute_definitions` introdotto da US-042 (contratti riusati, non ridefiniti: modello `AttributeDefinition`, servizio `App\Services\Enrichment\AttributeUnitConverter::convertToCanonical(AttributeDefinition $definition, float $value, ?string $unit): float` con `UnknownAttributeUnitException` per unitĂ  sconosciute, seeder con le 9 chiavi canoniche + `portata_lmin` e `description` italiane pensate come grounding del prompt). L'AI riporta valore e unitĂ  come letti nel testo; la conversione all'unitĂ  canonica avviene sempre in `EnrichmentApplier` via `AttributeUnitConverter`, mai delegata al modello. `AttributeResolver` e il relativo passo di pipeline vengono rimossi.

  - **Nuovo servizio `App\Services\Ai\AttributeVocabulary`** â€” speculare a `TaxonomyCatalog`: collezione di `AttributeDefinition` lazy-loaded e memoizzata per istanza (una sola query per job batch). API: `toPromptText(): string` che rende una riga per definizione nel formato `- chiave | tipo (numeric/text) | unitĂ  canonica (o â€śtesto liberoâ€ť) | descrizione` (le `description` italiane del seeder US-042 fanno da grounding), e `definitionFor(string $key): ?AttributeDefinition` con matching esatto sulla chiave dopo trim (le chiavi canoniche sono snake_case; nessun fuzzy matching: una chiave fuori registro deve fallire il lookup, non essere â€śaggiustataâ€ť).
  - **`ClassificationPromptBuilder` ancorato al registro** â€” la firma diventa `build(Collection $products, TaxonomyCatalog $taxonomy, AttributeVocabulary $vocabulary, string $model)`. Nel prompt: (1) si sostituisce l'istruzione a chiave libera (`"chiave libera, in snake_case, es. portata_lmin"`) con l'obbligo di usare ESCLUSIVAMENTE le chiavi del registro riportato nel prompt (chiave, tipo, unitĂ  canonica, descrizione da `toPromptText()`), omettendo l'attributo se nessuna chiave del registro Ă¨ pertinente; (2) si impone di riportare `value_num`/`value_text` e `unit` ESATTAMENTE come letti nel testo del prodotto, vietando qualunque conversione di unitĂ  (es. "3500 W" â†’ `value_num: 3500, unit: "W"`, NON `3.5 kW`: la conversione Ă¨ responsabilitĂ  dell'applicazione). Il blocco `knownAttributesText` (attributi giĂ  noti come contesto) resta invariato nel comportamento, con docblock aggiornato (non esiste piĂą l'estrazione regex come origine futura).
  - **`ClassificationResponseValidator` invariato** â€” le chiavi fuori registro NON vengono scartate nel validator: il filtro sta in `EnrichmentApplier`, perchĂ© deve coprire anche il percorso cache (`EnrichmentCache`, US-016) che bypassa il validator e puĂ˛ riproporre risultati pre-registro con chiavi libere (es. `potenza_watt`). Lo scarto nel solo validator lascerebbe un buco sul replay da cache.
  - **`EnrichmentApplier`: conversione e guardie** â€” costruttore esteso con `AttributeUnitConverter` (stateless, container-resolvable); `apply()` accetta il quarto parametro `AttributeVocabulary $vocabulary` (stessa istanza costruita dal job, una query per batch). In `applyAttributes()`, per ogni attributo proposto, nell'ordine: (1) guardia delle sorgenti autorevoli INVARIATA (una riga esistente con source diverso da `null`/`regex`/`ai` blocca scrittura e proposta: le righe `regex` esistenti restano valide e sovrascrivibili dall'AI, nessuna rigenerazione di massa); (2) chiave assente dal registro â†’ NON scritta e NESSUNA proposta registrata (comportamento minimo di US-043: il flusso di proposta/revisione delle definizioni fuori registro Ă¨ perimetro esplicito di US-044 â€” registrare oggi una proposta `pending` su chiave non canonica creerebbe righe che la Review Queue di US-041 non puĂ˛ applicare coerentemente); (3) confidenza sotto soglia â†’ proposta `pending` con valore/unitĂ  come letti, invariato; (4) definizione `numeric` con `value_num` presente â†’ `convertToCanonical(definition, value_num, unit)`; successo â†’ scrittura con `value_num` convertito e `unit = canonical_unit`, `source='ai'`, confidence, piĂą proposta `applied` (con valore/unitĂ  originali come letti dall'AI, fedeltĂ  di audit); `UnknownAttributeUnitException` â†’ NON scritta, proposta `pending` (con valore/unitĂ  originali) che resta in coda di revisione â€” il prodotto non Ă¨ forzato a `needs_review` (stesso trattamento del ramo bassa confidenza giĂ  esistente, coerente con US-041 dove le proposte attributo pending senza riga materializzata restano `pending`); (5) definizione `text` con `value_text` presente â†’ scrittura pass-through con `unit = null` (nessuna conversione, mai chiamato il converter su `data_type='text'` che lancerebbe `LogicException`); (6) mismatch di tipo (definizione `numeric` senza `value_num`, o `text` senza `value_text`) â†’ stesso percorso dell'unitĂ  non convertibile: non scritta, proposta `pending`. I docblock della classe vengono aggiornati (riferimenti a `AttributeResolver::writeAttribute()` rimossi).
  - **Wiring in `ClassifyProductsBatchJob`** â€” `handle()` istanzia `new AttributeVocabulary` accanto a `new TaxonomyCatalog` e la passa a entrambe le chiamate `promptBuilder->build()` (batch fast e escalation smart) e a ogni `applier->apply()` (`applyCachedResults` e `logResults`): il percorso cache riusa la stessa istanza, quindi anche i risultati cached passano dal filtro registro e dalla conversione.
  - **Rimozione `AttributeResolver` e passo di pipeline** â€” cancellati `app/Services/Enrichment/AttributeResolver.php` e `tests/Feature/AttributeResolverTest.php` (rimozione test esplicitamente richiesta dal criterio di accettazione della spec). `DeterministicEnrichmentPipeline`: rimossi il parametro costruttore, l'invocazione e la chiave `attributes_written` dal summary (e dal PHPDoc array-shape). `CatalogEnrichCommand`: rimossi l'inizializzazione della chiave, l'accumulo e la riga di output `"Attributi scritti"`. Docblock stale ripuliti in `EnrichmentProposalRecorder`, `EnrichmentApplier`, `SearchService` (riga 28), `ProductSearch` (riga 66) e `DeterministicEnrichmentPipeline`. Nessun down-path dati: le righe `product_attributes` con `source='regex'` restano a DB, valide e sovrascrivibili (guardia invariata), e si estinguono naturalmente.

  ## Strategia di Test

  Spec interamente backend (nessuna nuova UI): niente mockup e niente scenari e2e; copertura feature-test PHPUnit. I test che coinvolgono il vocabolario seedano il registro con `AttributeDefinitionSeeder` (o factory US-042 per casi mirati).

  - `tests/Feature/AttributeVocabularyTest.php` (nuovo): `toPromptText()` contiene chiave, tipo, unitĂ  canonica e descrizione di ogni definizione seedata; `definitionFor()` risolve una chiave canonica e ritorna `null` su chiave fuori registro; memoizzazione (una sola query su chiamate ripetute, verificabile con conteggio query).
  - `tests/Feature/ClassificationPromptBuilderTest.php` (aggiornato): adeguamento di tutte le chiamate alla nuova firma; nuovi test: il prompt include il vocabolario del registro (chiave, tipo, unitĂ  canonica, descrizione); il prompt impone l'uso esclusivo delle chiavi canoniche e non contiene piĂą l'istruzione a chiave libera; il prompt impone valore/unitĂ  come letti nel testo e vieta la conversione.
  - `tests/Feature/EnrichmentApplierTest.php` (aggiornato): setUp con seeding del registro e adeguamento delle chiamate `apply()`. Nuovi casi: il caso "Dimostra" â€” attributo AI `potenza_kw` con `value_num=3500, unit='W'` ad alta confidenza â†’ riga `product_attributes` `potenza_kw = 3.5`, `unit='kW'`, `source='ai'`; unitĂ  non convertibile (es. `potenza_kw` con `unit='CV'`) â†’ riga NON scritta e proposta `pending` in `enrichment_proposals` con valore/unitĂ  originali; chiave fuori registro â†’ non scritta e nessuna proposta; attributo testuale (`materiale`) â†’ pass-through con `unit=null`; mismatch di tipo â†’ non scritto, proposta `pending`; riga esistente `source='regex'` sovrascritta dall'AI (guardia invariata) e riga `source='manual'` mai sovrascritta (regressione); `unit=null` su definizione numerica â†’ valore scritto invariato in unitĂ  canonica.
  - `tests/Feature/ClassifyProductsBatchJobTest.php` (aggiornato): seeding del registro dove i test esercitano attributi; verifica che il percorso cache-hit applichi il filtro registro/conversione (risultato cached con chiave fuori registro non scrive la riga).
  - `tests/Feature/DeterministicEnrichmentPipelineTest.php` (aggiornato): rimozione del costruttore `AttributeResolver` e delle asserzioni su `attributes_written`; la pipeline continua a risolvere brand/grouping/famiglie.
  - `tests/Feature/AttributeResolverTest.php`: eliminato (criterio di accettazione della spec).
  - Regressione: rieseguire `AttributeUnitConverterTest` (US-042), `EnrichmentProposalRecorderTest`/`ReviewQueueDetailTest` (le proposte pending restano coerenti con US-041), `SearchServiceFiltersTest` e `CatalogEnrichCommand`-related suite; `vendor/bin/sail bin pint --dirty` a chiusura.

  **Assunzioni registrate** (sessione autonoma, nessun chiarimento richiesto): (1) US-042 Ă¨ PLANNED ma non ancora implementata: questo piano dipende dai suoi artefatti (`AttributeDefinition`, `AttributeUnitConverter`, `UnknownAttributeUnitException`, `AttributeDefinitionSeeder`) e l'implementazione di US-043 deve partire solo a US-042 DONE; (2) chiave fuori registro â†’ scartata senza scrittura nĂ© proposta: il flusso di proposta di nuove definizioni Ă¨ perimetro di US-044, e una proposta pending su chiave non canonica sarebbe inapplicabile dalla Review Queue attuale; (3) unitĂ  non convertibile â†’ proposta `pending` senza forzare `needs_review` sul prodotto, speculare al ramo bassa confidenza esistente (la proposta resta visibile nel registro proposte, come giĂ  documentato in US-041 per le proposte mai materializzate); (4) le proposte registrate conservano valore/unitĂ  come letti dall'AI (fedeltĂ  di audit), mentre la riga `product_attributes` riceve il valore convertito con `unit = canonical_unit`; (5) mismatch di tipo valore/definizione trattato come non applicabile (proposta `pending`), non come errore di validazione; (6) il filtro registro sta in `EnrichmentApplier` e non nel validator per coprire il replay da `EnrichmentCache` con risultati pre-registro; (7) matching della chiave esatto dopo trim, nessuna normalizzazione fuzzy lato applicazione â€” Ă¨ il prompt a imporre le chiavi canoniche.
