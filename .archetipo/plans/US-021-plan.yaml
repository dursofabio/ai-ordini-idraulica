    status: DONE
    dependencies:
      - TASK-01
      - TASK-02
    ref: TASK-03
  - id: TASK-04
    title: 'Test: ProductResource (filtri, guard manuale, distinzione visiva)'
    description: Feature test con Livewire::test su ListProducts (filtri enrichment_status/brand/family) e su EditProduct (salvataggio con brand/family cambiati imposta *_source='manual', source='manual', confidence=100; salvataggio senza modifiche non altera i source esistenti; markup/badge distinto per valori manuali in tabella e form).
    type: Test
    status: DONE
    dependencies:
      - TASK-01
      - TASK-02
      - TASK-03
    ref: TASK-04
  - id: TASK-05
    title: 'ProductBaseResource: tabella e form title/description_ai'
    description: 'Generare App\Filament\Resources\ProductBaseResource, disabilitare create/delete. Tabella: title, brand/family/subfamily, description_ai troncato. Form di modifica: TextInput title, Textarea description_ai, entrambi editabili (AC3).'
    type: Impl
    status: DONE
    ref: TASK-05
