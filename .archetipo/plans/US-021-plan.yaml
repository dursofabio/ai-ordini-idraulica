schema: archetipo/plan/v2
spec_code: US-021
body: |-
  ## Soluzione Tecnica

  **Contesto e gap da colmare**
  Non esiste ancora nessuna risorsa Filament nel progetto (`app/Filament/Resources/` è vuota; `AdminPanelProvider` la scopre già via `discoverResources`, US-002). Lo schema dati però è già completo: `products` ha `brand_id/family_id/subfamily_id`, i rispettivi `*_source` (`brand_source`, `family_source`, `subfamily_source`), il campo aggregato `source`/`confidence` e `enrichment_status`; `product_bases` ha `title`/`description_ai`. `EnrichmentApplier` (US-015) già rispetta il guard `$product->brand_source !== 'manual'` (idem family/subfamily) per non sovrascrivere nei reimport AI. Questa spec non richiede quindi nessuna migration: si tratta di costruire l'interfaccia Filament e la logica che scrive correttamente quei flag quando un admin corregge un valore a mano.

  **Decisioni chiave**

  1. **Due risorse Filament v5**, generate con `php artisan make:filament-resource --no-interaction`: `ProductResource` (su `Product`) e `ProductBaseResource` (su `ProductBase`). Entrambe sola lista+modifica: `canCreate()`/`canDelete()` disabilitati (i record nascono dalla pipeline di import US-006/US-007, non da creazione manuale in backoffice).

  2. **`ProductResource` — tabella (AC1)**: colonne `codice_articolo`, `description_raw`, `brand.name` (badge), `family.name` (badge), `enrichment_status` (badge con colori pending/enriched/needs_review), `confidence`. Filtri: `SelectFilter` su `enrichment_status` (opzioni statiche pending/enriched/needs_review, uniche già in uso nel codebase — vedi `EnrichmentApplier`/`ClassifyProductsBatchJob`), `SelectFilter` su `brand` e `family` via `->relationship('brand','name')` / `->relationship('family','name')`.

  3. **`ProductResource` — form di modifica**: `Select::make('brand_id')->relationship('brand','name')->searchable()->preload()`, stesso pattern per `family_id`; `Select::make('subfamily_id')` con opzioni filtrate reattivamente sulla famiglia selezionata (`->options(fn (Get $get) => Subfamily::where('family_id', $get('family_id'))->pluck('name','id'))->live()`). `codice_articolo`/`description_raw` mostrati disabled/placeholder per contesto, non editabili (fuori scope AC).

  4. **Guard 'sorgente manuale' (AC2)**: implementato in `EditProduct::mutateFormDataBeforeSave()`, NON come Observer su `Product`. Motivo: un Observer che marca `*_source='manual'` a ogni `brand_id` dirty non può distinguere una scrittura admin da una scrittura di `EnrichmentApplier` (che modifica `brand_id` e `brand_source='ai'` nello stesso `fill()`) — rischierebbe di sovrascrivere il source corretto impostato dall'AI. Il page-hook di Filament invece è per costruzione scoped alla sola submission dal form di backoffice. Logica: per ciascuno di `brand_id`/`family_id`/`subfamily_id` presente nei dati inviati, confrontarlo con il valore attuale del record; se diverso, impostare il corrispondente `*_source = 'manual'`. Se almeno uno dei tre è cambiato, impostare anche i campi aggregati `source = 'manual'` e `confidence = 100` — questo copre sia la dicitura letterale dell'AC2 (`source='manual'`, `confidence=100`) sia il meccanismo di protezione realmente verificato da `EnrichmentApplier` sui campi `*_source` (coerente con lo scenario "Dimostra", che parla di `brand_source='manual'`). L'estensione del guard anche a `subfamily_id` (non nominato esplicitamente nell'AC2, che cita solo marca/famiglia) è un'assunzione di coerenza con lo schema esistente e con `EnrichmentApplier`, che ha già lo stesso guard per subfamily.

  5. **Distinzione visiva (AC5)**: in tabella, `TextColumn` per brand/family renderizzata come badge con colore condizionale (`->color(fn ($record) => $record->brand_source === 'manual' ? 'success' : 'gray')`) più un'icona lucchetto quando manuale. Nel form di modifica, `->helperText()` dinamico su ciascun Select che mostra la sorgente corrente ("Impostato manualmente" vs "Origine: ai/regex/dictionary/—").

  6. **`ProductBaseResource` — tabella e form (AC3)**: tabella con `title`, `brand.name`/`family.name`/`subfamily.name`, `description_ai` troncato. Form di modifica: `TextInput::make('title')`, `Textarea::make('description_ai')`, entrambi editabili e salvati con `save()` standard — il salvataggio riusa l'`ProductBaseObserver` già esistente (US-018), che dispatcha automaticamente `GenerateProductBaseEmbeddingJob` quando `description_ai` è effettivamente cambiato: nessuna logica aggiuntiva necessaria per questo effetto collaterale.

  7. **Azione 'Rigenera embedding' (AC4)**: `Actions\Action` esposta sia come header action nella pagina di modifica sia come row action in tabella, che chiama esplicitamente `GenerateProductBaseEmbeddingJob::dispatch($record->id)`. È intenzionalmente indipendente dall'Observer di US-018, perché deve funzionare anche quando `description_ai` NON è cambiato (rigenerazione forzata, es. dopo un cambio di provider/modello embedding).

  8. **Nessuna migration**: tutte le colonne necessarie esistono già (verificato su `create_products_table`, `create_product_bases_table`, `add_description_ai_to_product_bases_table`).

  **Alternative scartate**: guard 'manual' via Observer su `Product` (ambiguità con le scritture di `EnrichmentApplier`, vedi punto 4); risorse Filament dedicate per `Brand`/`Family` per i filtri (non necessarie, `SelectFilter` con `->relationship()` usa direttamente le relazioni esistenti senza bisogno di risorse CRUD proprie); mockup/design dedicato (le due risorse sono CRUD Filament standard basate sui componenti nativi del design system già in uso in `AdminPanelProvider`, nessuna interfaccia custom da progettare).

  ## Strategia di Test

  - Feature test su `ListProducts` (`Livewire::test`): i filtri `enrichment_status`, `brand_id`, `family_id` riducono correttamente il result set atteso (AC1).
  - Feature test su `EditProduct`: `fillForm(['brand_id' => ...])->call('save')` seguito da assert sul record ricaricato da DB che `brand_source === 'manual'`, `source === 'manual'`, `confidence === 100`; stesso test per `family_id`. Test complementare: un salvataggio che non modifica marca/famiglia NON altera i `*_source`/`confidence` preesistenti (AC2).
  - Feature test che verifica la resa visiva distinta (badge/colore/helper text) per record con `*_source = 'manual'` rispetto a `ai`/`regex`/null, sia in tabella sia nel form di modifica (AC5).
  - Feature test su `EditProductBase`: modifica di `title`/`description_ai` persiste correttamente sul record (AC3).
  - Feature test sull'azione 'Rigenera embedding': con `Queue::fake()`, l'azione dispatcha `GenerateProductBaseEmbeddingJob` con il `productBaseId` corretto, sia quando `description_ai` è invariato sia quando cambia (AC4).

  ### E2E Test — Simulazione Utente

  **Framework:** Laravel Dusk (già presente nel progetto, `tests/Browser`, pattern di riferimento `AdminLoginTest` da US-002)
  **Registrazione screenshot:** abilitata per ogni step significativo (Dusk non supporta la registrazione video nativa in questo progetto — si segue lo stesso pattern a screenshot-per-step già adottato in US-002)

  | Scenario | Descrizione del flusso utente |
  |---|---|
  | Correzione manuale marca | L'admin autenticato apre `/admin`, naviga alla lista prodotti, apre un prodotto, cambia la marca assegnata e salva; verifica che il prodotto mostri il badge/indicatore "Manuale" per la marca. Screenshot salvati in `docs/test-results/US-021/` (override del `protected const ARTIFACT_DIR` di `DuskTestCase`, stesso meccanismo di `AdminLoginTest`). |

  _Nessuna nuova infrastruttura e2e da installare: Dusk è già configurato (`tests/DuskTestCase.php`, ChromeDriver)._
tasks:
