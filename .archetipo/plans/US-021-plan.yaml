    title: 'ProductResource: tabella con filtri e form di modifica taxonomy'
    description: 'Generare App\Filament\Resources\ProductResource (php artisan make:filament-resource Product --no-interaction), disabilitare create/delete. Tabella: codice_articolo, description_raw, brand.name, family.name, enrichment_status, confidence, con SelectFilter per enrichment_status/brand/family (AC1). Form: Select brand_id/family_id (relationship, searchable, preload) e subfamily_id (opzioni reattive alla famiglia selezionata).'
    type: Impl
    status: DONE
    ref: TASK-01
  - id: TASK-02
    title: Guard 'sorgente manuale' su EditProduct
    description: In EditProduct::mutateFormDataBeforeSave, confrontare brand_id/family_id/subfamily_id inviati con i valori correnti del record; per ciascun campo cambiato impostare il *_source corrispondente a 'manual'. Se almeno un campo è cambiato, impostare anche source='manual' e confidence=100 (AC2).
    type: Impl
    status: DONE
    dependencies:
      - TASK-01
    ref: TASK-02
