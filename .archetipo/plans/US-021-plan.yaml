    title: Azione 'Rigenera embedding' su ProductBaseResource
    description: Aggiungere un'Action (header action su EditProductBase e row action in tabella) che dispatcha esplicitamente GenerateProductBaseEmbeddingJob::dispatch($record->id), indipendentemente da eventuali modifiche a description_ai (AC4).
