schema: archetipo/plan/v2
spec_code: US-047
body: |
  # US-047: Ricerca flat a livello di prodotto e rimozione di ProductBase — Implementation Plan

  **Generato da:** ARchetipo Planning Team
  **Data:** 2026-07-04

  ---

  ## Spec

  **Epica:** EP-009 — Normalizzazione AI e Ricerca a Prodotto Singolo
  **Priorità:** HIGH | **Punti:** 5

  **User Story**
  Come utente della ricerca, voglio risultati a livello di singolo prodotto ordinati per rilevanza, così da trovare lo SKU esatto invece di un gruppo di varianti.

  **Criteri di Accettazione**
  - `SearchService` opera su `Product`: filtri attributi diretti sul prodotto, ranking con join su `product_embeddings.product_id`, match esatto su `codice_articolo` sempre in cima
  - `variants_count` e `power_range` rimossi da risultati, API e pagina Filament; lista piatta senza deduplica (decisione confermata)
  - `ProductBase` (modello e tabella), `GroupingResolver` e i job/resource collegati rimossi, con migrazioni di dismissione
  - `GET /api/search` e la pagina di ricerca funzionano invariati nell'interfaccia esterna, con i test aggiornati e verdi

  ---

  ## Technical Solution

  Questa spec completa lo spostamento di ricerca ed embedding a livello di singolo `Product` iniziato in US-046: `ProductBase`/`GroupingResolver` vengono rimossi del tutto, `SearchService` diventa flat (una riga per SKU, nessuna aggregazione per gruppo), e ogni componente ancora agganciato al concetto di "base" viene aggiornato o eliminato di conseguenza.

  - **Nota sull'interfaccia API**: nel codice attuale non esiste alcuna route/controller `GET /api/search` (nessun `routes/api.php`, nessun controller di ricerca) — solo la pagina Filament (`ProductSearch`) consuma `SearchService` oggi. L'AC viene quindi interpretata come: il contratto pubblico di `SearchService` (usato dalla pagina e da qualunque futura API, es. US-048) espone risultati piatti a livello di prodotto; la costruzione dell'endpoint REST resta fuori scope qui e non regredisce nulla perché non esiste ancora.
  - **`ProductBase` e `GroupingResolver` come dipendenza a cascata**: `FamilyPropagationResolver` propaga `family_id`/`subfamily_id` tra "varianti sorelle" di uno stesso `ProductBase` — un concetto che sparisce insieme al raggruppamento. È quindi trattato come "resource collegato" da rimuovere insieme a `GroupingResolver` (non ha più un gruppo su cui operare), con `DeterministicEnrichmentPipeline` aggiornata per non invocare più né l'uno né l'altro e senza le relative chiavi nel summary (`groups_resolved`, `families_propagated`). Questa perdita di funzionalità (propagazione taxonomy tra varianti) è una conseguenza diretta e assunta della rimozione di `ProductBase` richiesta dalla spec, non una regressione accidentale.
  - **Migrazioni di dismissione**: una migrazione droppa la FK/colonna `products.product_base_id` e la colonna `products.grouping_key` (entrambe superflue senza raggruppamento), poi droppa la tabella `product_bases`. Segue lo stesso pattern "drop & (best-effort) recreate in down()" già usato in `2026_07_04_100000_refactor_product_embeddings_to_product_id.php`: i dati non sono migrabili in modo significativo (erano solo chiavi di raggruppamento), quindi nessun backfill è necessario.
  - **Modello e factory**: `ProductBase` (modello + factory) rimossi; `Product::productBase()` e i campi `product_base_id`/`grouping_key` rimossi da fillable/factory.
  - **`SearchService` flat**: `buildSearchQuery()` opera su `Product::query()` invece di `ProductBase::query()`. `applyFilters()` applica `brand_id`/`family_id`/`subfamily_id` direttamente sulle colonne di `Product` (oggi già presenti sul prodotto) e i filtri attributo restano su `whereHas('attributes', ...)` (già una relazione diretta di `Product`, nessun cambio di semantica). `applyRanking()` sostituisce la subquery correlata introdotta in US-046 (`product_embeddings` → `products` via `product_base_id`) con un join/subquery diretto su `product_embeddings.product_id = products.id` (join naturale, non più correlato a una base) e usa `products.search_vector` invece di `product_bases.search_vector` per il punteggio FTS. Il match esatto su `codice_articolo` risolve direttamente l'id del `Product` (non più il `product_base_id`). `withGroupingMeta()` e la costante `POWER_ATTRIBUTE_KEY` sono rimossi: nessuna aggregazione, una riga per prodotto.
  - **`SearchResult`**: semplificato a wrapper di `Product` (rimossi `variantsCount`/`powerRangeMin`/`powerRangeMax`), poiché non c'è più nulla da aggregare per gruppo.
  - **Pagina di ricerca (`ProductSearch`)**: `->model(Product::class)`; le colonne tabella `variants_count`/`power_range` (e `formatPowerRange()`) sono rimosse; la colonna titolo usa `product_type` (fallback `description_clean`) al posto di `ProductBase::title`; marca/famiglia/sottofamiglia restano lette dalle relazioni dirette di `Product`. Nessuna deduplica/collasso in UI (assunzione confermata nella spec): varianti quasi identiche escono adiacenti nel ranking, l'utente le restringe con i filtri.
  - **`ProductBaseResource`** (intera directory: resource, pages, form, table, relation manager) rimosso — Filament lo scopre per convenzione di directory, nessuna deregistrazione esplicita necessaria.
  - **`CatalogReindexCommand`**: il ramo di reindex/recompute per `product_bases` viene rimosso, mantenendo solo quello per `products` (già esistente da US-046).

  ---

  ## Test Strategy

  Nessuna nuova interfaccia utente introdotta (solo rimozione/adattamento dell'esistente) — nessuna strategia e2e nuova richiesta; i test browser esistenti sulla pagina di ricerca vengono aggiornati, non creati ex novo.

  - Test di schema/relazioni (`ProductCatalogSchemaTest`, `ProductCatalogRelationsTest`) aggiornati per l'assenza di `product_bases`/`product_base_id`/`grouping_key`.
  - `DeterministicEnrichmentPipelineTest`, `ClassifyProductsBatchJobTest`, `CatalogEnrichCommandTest` aggiornati al summary senza `groups_resolved`/`families_propagated`; `GroupingResolverTest` e `FamilyPropagationResolverTest` rimossi (classi rimosse).
  - Suite `SearchService*` (`FusionRanking`, `Filters`, `ExactCodeMatch`, `RelevanceCutoff`, `Performance`, `EmbeddingCache`) e `SearchVectorPgvectorTest`/`VectorEmbeddingPgvectorTest` aggiornate a fixture e asserzioni a livello di singolo `Product` (niente più `ProductBase` di supporto); `SearchServiceGroupingTest` rimosso (il concetto di grouping testato non esiste più).
  - `ProductBaseResourceTest` rimosso; `ProductResourceViewTest` verificato/aggiornato per eventuali riferimenti residui a `ProductBase`.
  - `ProductSearchPageTest` e `Browser/ProductSearchTest` aggiornati alle nuove colonne tabella (niente `variants_count`/`power_range`) e ai risultati piatti per prodotto.
  - `CatalogReindexCommandTest` aggiornato al reindex solo su `products`.

  ---

  _Plan generato via ARchetipo Planning — 2026-07-04_
