body: |-
  # US-010: Estrattori attributi tecnici regex (kW, litri, pollici, materiale) â€” Piano di Implementazione

  **Generato da:** Team di Planning ARchetipo
  **Data:** 2026-07-01

  ---

  ## Spec

  **Epica:** EP-003 â€” Arricchimento Deterministico
  **PrioritĂ :** HIGH | **Punti:** 3
  **Bloccata da:** US-009

  **User Story**
  Come amministratore del catalogo, voglio che gli attributi tecnici (potenza kW, capacitĂ  litri, attacchi pollici, dimensioni, materiale) vengano estratti automaticamente dalle descrizioni tramite pattern regex, cosĂ¬ da abilitare i filtri range nella ricerca senza richiedere intervento manuale.

  **Criteri di Accettazione**
  - [ ] L'estrattore kW popola `value_num` e `unit='kW'` per descrizioni tipo `3.5KW` e codici serie tipo `VAI 8-025`
  - [ ] L'estrattore litri popola `value_num` e `unit='L'` per descrizioni tipo `BOLLITORE 800 LT`
  - [ ] L'estrattore pollici popola `value_num` e `unit='"'` per descrizioni tipo `RIDUTTORE 1"`
  - [ ] L'estrattore materiale popola `value_text` per sigle come `RG`, `INOX`, `PVC`, `RAME`
  - [ ] Gli attributi hanno `source='regex'` e i numerici hanno `value_num` valorizzato per i filtri range

  ---

  ## Technical Solution

  `product_attributes` esiste giĂ  dallo schema US-004 (`product_id`, `key`, `value_num`, `value_text`, `unit`, `source`, con gli indici `(key, value_num)` e `(product_id, key)`) e `products.description_clean` Ă¨ giĂ  popolata da `BrandResolver` (US-009): questa spec non introduce nessuna migration, solo un nuovo resolver di dominio che legge `description_clean ?? description_raw` e scrive righe in `product_attributes`. Ho verificato i pattern reali sul file `docs/data/inventario articoli.xlsx` (sharedStrings) per calibrare le regex sui dati veri del catalogo, non su esempi teorici.

  - **`App\Services\Enrichment\AttributeResolver`**: nuova classe accanto a `BrandResolver`, stesso pattern architetturale (nessun job/comando di orchestrazione â€” l'esecuzione batch su tutti i prodotti resta a una spec futura di EP-008, coerente con la decisione presa in US-009). Espone `resolve(Product $product): int` (numero di attributi scritti):
    - **Testo sorgente**: `trim($product->description_clean ?? $product->description_raw ?? '')`; se vuoto ritorna `0` senza query.
    - Esegue in sequenza i 4 estrattori indipendenti (nessuna prioritĂ  reciproca, chiavi diverse) e per ogni match chiama un helper privato `writeAttribute()` che fa `ProductAttribute::updateOrCreate(['product_id' => ..., 'key' => ...], [...,'source' => 'regex'])`.
    - **Guardia prioritĂ  fonte** (stesso principio di `BrandResolver::resolve()`): se esiste giĂ  una riga `product_attributes` per quella `product_id`+`key` con `source` non nullo e diverso da `'regex'` (es. `'ai'` o `'manual'`, assegnato da una spec futura di EP-004), `writeAttribute()` non la sovrascrive â€” un passaggio deterministico non deve mai retrocedere un dato piĂą autorevole. Se la riga esistente ha `source='regex'` (o non esiste), viene creata/aggiornata normalmente: questo rende `resolve()` idempotente su ri-esecuzioni dopo un cambio di `description_clean`.
    - **Estrattore kW â†’ chiave `potenza_kw`, `unit='kW'`**: due pattern tentati in ordine.
      1. UnitĂ  esplicita: `/(\d+(?:[.,]\d+)?)\s*[kK][wW]\b/u` â€” copre `3.5KW`, `0,13KW`, `35 Kw`, `(120KW)`. La virgola decimale viene normalizzata in punto prima del cast a float.
      2. Codice di serie (fallback se nessuna unitĂ  esplicita trovata): `/\bVAI\s+(\d+(?:[.,]\d+)?)-\d+/iu` â€” confermato sui dati reali (`VAI 1-025`, `VAI 3-025`, `VAI 6-025`, `VAI 8-025` â€¦ tutte varianti Vaillant Aroterm dove il numero dopo `VAI` Ă¨ la potenza nominale in kW). **Assunzione registrata**: `VAI` Ă¨ l'unico prefisso di serie confermato nei dati campione; il prefisso Ă¨ mantenuto in una lista statica dedicata nella classe cosĂ¬ che altri prefissi scoperti in futuro (altre serie Vaillant o di altri brand) possano essere aggiunti senza toccare la logica di match.
    - **Estrattore litri â†’ chiave `capacita_litri`, `unit='L'`**: `/(\d+(?:[.,]\d+)?)\s*LT\b/iu` â€” copre `BOLLITORE 800 LT`, `50 LT`, `100 LT` (verificato sui dati reali).
    - **Estrattore pollici â†’ chiave `attacco_pollici`, `unit='"'`**: `/(?:(\d+)\s+)?(\d+\/\d+|\d+)"/u` â€” copre intero (`1"`), frazione (`3\/4"`, `1\/2"`) e numero misto spazio-separato (`1 1\/4"`), tutti presenti nei dati reali. La frazione viene convertita in decimale (`3/4" â†’ 0.75`, `1 1/4" â†’ 1.25`). **Limite noto registrato come assunzione**: alcuni codici prodotto (es. ventole Vortice `100/4"`, `150/6"`) terminano coincidentalmente con `"` come etichetta dimensionale non riferita ad un attacco filettato; vengono comunque estratti come falsi positivi a basso impatto (fuori range tipico 1/8"-4" per i filtri, accettabile per l'MVP) â€” raffinamento eventuale demandato a una spec successiva con dati di validazione reali.
    - **Estrattore materiale â†’ chiave `materiale`, solo `value_text` (nessun `value_num`/`unit`)**: match a dizionario per parola intera, case-insensitive, contro una lista statica `['RG', 'INOX', 'PVC', 'RAME']` (stesso stile della lista alias di `Brand`, ma qui inline nella classe: non esiste una tabella `materials` e introdurne una non Ă¨ richiesto da nessun criterio di accettazione). A differenza di `BrandResolver`, un match multiplo non Ă¨ trattato come ambiguo: viene preso il primo token che compare in ordine di posizione nel testo, perchĂ© una descrizione puĂ˛ legittimamente citare piĂą materiali (es. corpo + guarnizione) e l'obiettivo qui Ă¨ catturare il materiale principale per i filtri, non disambiguare un'entitĂ  unica come il brand.

  ---

  ## Test Strategy

  Spec di dominio senza UI: feature test in-memory SQLite (`RequiresDatabase` + `RefreshDatabase`), stesso pattern di `BrandResolverTest`. Nessun test e2e Ă¨ richiesto (nessuna interazione utente). I casi di test usano le stringhe reali trovate in `docs/data/inventario articoli.xlsx` dove disponibili, per evitare regex calibrate solo su esempi sintetici.

  - **Test kW â€” unitĂ  esplicita**: descrizioni con `3.5KW`, `0,13KW` (virgola decimale) e `35 Kw` (spazio, minuscolo) â†’ `value_num` corretto, `unit='kW'`, `key='potenza_kw'`, `source='regex'`.
  - **Test kW â€” codice serie VAI**: `UNITA' ESTERNA VAI 8-025 WNO VAILLANT` â†’ `value_num=8`, `unit='kW'`.
  - **Test kW â€” nessun match**: descrizione senza unitĂ  nĂ© codice serie â†’ nessuna riga `product_attributes` con `key='potenza_kw'`.
  - **Test litri**: `BOLLITORE 800 LT SOLARE...` â†’ `value_num=800`, `unit='L'`, `key='capacita_litri'`.
  - **Test pollici â€” intero, frazione, misto**: `RIDUTTORE PRESS.ACQUA 1" C/MANOM.` â†’ `value_num=1`; una descrizione con `3/4"` â†’ `value_num=0.75`; `ADATTATORE 1 1/4" A 28MM RAME` â†’ `value_num=1.25`. Tutti con `unit='"'`, `key='attacco_pollici'`.
  - **Test materiale**: descrizioni contenenti `INOX`, `PVC`, `RAME`, `RG` come parola intera â†’ `value_text` corrispondente, `key='materiale'`, `value_num`/`unit` nulli.
  - **Test integrazione `resolve()`**: una descrizione che combina piĂą segnali (es. `CALDAIA 24KW BOLLITORE INOX`) produce in una sola chiamata piĂą righe `product_attributes` (una per chiave) tutte con `source='regex'`.
  - **Test idempotenza / guardia prioritĂ  fonte**: ri-eseguire `resolve()` sullo stesso prodotto non duplica righe (stesso `product_id`+`key` aggiornato via upsert); una riga preesistente con `source='ai'` per una chiave non viene sovrascritta da una ri-esecuzione che troverebbe un match regex diverso per la stessa chiave.
  - **Test 'Dimostra'**: dato un campione di prodotti con `potenza_kw` estratta, una query `ProductAttribute::where('key', 'potenza_kw')->whereBetween('value_num', [2, 6])` restituisce esattamente i prodotti con potenza nel range, confermando il criterio di accettazione sui filtri range.

  ---

