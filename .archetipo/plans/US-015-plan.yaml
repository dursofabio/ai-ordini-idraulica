spec_code: US-015
body: |
  # US-015: Scrittura arricchimento con regole di confidenza — Implementation Plan

  **Generated by:** ARchetipo Planning Team
  **Date:** 2026-07-01

  ---

  ## Spec

  **Epic:** EP-004 — Arricchimento AI
  **Priority:** HIGH | **Points:** 3
  **Blocked by:** US-014 (DONE)

  **User Story**
  Come amministratore del catalogo, voglio che i risultati dell'AI vengano applicati ai prodotti solo se superano una soglia di confidenza, così da mantenere alta la qualità del catalogo e identificare facilmente gli articoli da revisionare manualmente.

  **Acceptance Criteria**
  - `confidence >= 85` → applica valori AI, `enrichment_status='enriched'`
  - `confidence 60-84` → applica valori AI, `enrichment_status='needs_review'`
  - `confidence < 60` → non applica valori AI, `enrichment_status='needs_review'`
  - I valori con `brand_source='manual'` non vengono mai sovrascritti dall'AI
  - Ogni applicazione aggiorna il campo `source` con `'ai'` e il campo `confidence` con il valore ricevuto

  ---

  ## Technical Solution

  US-014 (già DONE) produce, per ogni prodotto di un lotto, un `EnrichmentLog` (`step='ai_classification'`) con `output` JSON contenente `brand`/`family`/`subfamily`/`product_type`/`enriched_description` (nomi testuali, non ID) e `confidence`, ma **non scrive mai** `brand_id`/`family_id`/`subfamily_id`/`enrichment_status='enriched'` sul prodotto — l'unica eccezione è il path di doppio fallimento di validazione JSON, che marca già `needs_review` direttamente nel job. US-015 chiude questo cerchio introducendo il servizio che applica (o rifiuta di applicare) quell'output al prodotto secondo le soglie di confidenza, riusando gli stessi pattern di provenienza (`source`/`*_source`) già stabiliti da `BrandResolver` (US-009) e `AttributeResolver` (US-010/US-028).

  - **`App\Services\Ai\TaxonomyCatalog` (estensione, non nuovo file):** aggiungere tre metodi pubblici `findBrand(string $name): ?Brand`, `findFamily(string $name): ?Family`, `findSubfamily(string $name, ?string $familyName = null): ?Subfamily` che riusano le collezioni già memoizzate (`brands()`, `families()`, `subfamilies()`) e la stessa comparazione case-insensitive su name/slug già usata da `isValidBrand`/`isValidFamily`/`isValidSubfamily`. Questo evita di duplicare la logica di lookup nome→modello: il validatore (US-014) continua a usare i metodi booleani esistenti, `EnrichmentApplier` (nuovo, questa spec) usa i nuovi metodi per ottenere l'id da scrivere.
  - **`App\Services\Enrichment\EnrichmentApplier` (nuovo servizio):** riceve un `Product` e un `ClassifiedProduct` (DTO già esistente da US-014) più un `TaxonomyCatalog`, e applica le regole di confidenza:
    - `confidence === null` o `confidence < 60` → non tocca `brand_id`/`family_id`/`subfamily_id`/`source`/`confidence`; imposta solo `enrichment_status = 'needs_review'`.
    - `confidence` compreso 60-84 → risolve e applica i valori AI (secondo le guardie sotto), imposta `enrichment_status = 'needs_review'`.
    - `confidence >= 85` → risolve e applica i valori AI, imposta `enrichment_status = 'enriched'`.
    - **Guardia manuale:** per ciascun campo (brand/family/subfamily) il valore AI viene scritto solo se il campo `*_source` corrispondente non è già `'manual'`. Se `brand_source === 'manual'`, `brand_id`/`brand_source` restano invariati anche quando la classificazione AI propone un brand diverso; stesso principio per `family_source`/`subfamily_source`. Pattern identico alla guardia già usata in `AttributeResolver::writeAttribute` (non sovrascrivere una fonte più autorevole).
    - Quando un valore proposto dall'AI (es. `brand`) non trova corrispondenza nella tassonomia chiusa (già garantito raro, perché `ClassificationResponseValidator` in US-014 rigetta risposte con valori fuori tassonomia, ma resta possibile un `null` esplicito dall'AI quando incerta) il campo semplicemente non viene applicato, senza considerarlo un errore.
    - Ad ogni applicazione (bande 60-84 e >=85) imposta sempre `source = 'ai'` e `confidence = <valore ricevuto>` a livello di prodotto, indipendentemente dal fatto che tutti i singoli campi (brand/family/subfamily) siano stati effettivamente scritti o bloccati dalla guardia manuale — l'AC richiede che il campo `confidence` rifletta sempre l'ultimo valore ricevuto dall'AI.
    - Idempotenza: se il prodotto ha già `enrichment_status` diverso da `'pending'` E i valori da applicare sono identici a quelli già presenti, l'update Eloquent risulta comunque no-op sicuro (nessun guard aggiuntivo necessario, Eloquent non genera una query se nessun attributo è `dirty`); non serve un guard esplicito perché — a differenza di `BrandResolver` — qui l'input è già stato filtrato a monte da `ClassifyProductsBatchJob` (`enrichment_status = 'pending'`).
  - **Punto di innesto in `App\Jobs\ClassifyProductsBatchJob` (estensione mirata, il job resta DONE/US-014 ma riceve una chiamata aggiuntiva):** in `logResults()`, subito dopo aver costruito la riga di log per ogni prodotto (quindi si dispone già di `$result` come `ClassifiedProduct` valido), invocare `app(EnrichmentApplier::class)->apply($product, $result, $taxonomy)` prima di passare al prodotto successivo. Questo è l'unico punto del job in cui esiste già, per ogni prodotto, sia il modello `Product` sia il `ClassifiedProduct` validato nello stesso ciclo `foreach`, quindi non serve una query aggiuntiva né un nuovo passaggio sui dati. Il path `markNeedsReview()` (doppio fallimento JSON) resta invariato: non c'è alcun `ClassifiedProduct` da applicare in quel caso, l'AC è già soddisfatto da US-014.
  - **Nessuna nuova colonna/migrazione:** tutte le colonne necessarie (`brand_source`, `family_source`, `subfamily_source`, `source`, `confidence`, `enrichment_status`) esistono già nello schema `products` (migrazione US-002/US-003 area). Nessun nuovo Enum: il progetto non usa enum per questi campi stringa (unico enum esistente è `ImportBatchStatus`, dominio import batch, non pertinente), coerente con la convenzione osservata in `BrandResolver`/`AttributeResolver`.
  - **Nessuna configurazione nuova:** le soglie 60 e 85 sono valori di dominio fissati dall'AC (non variano per ambiente come i nomi modello), quindi vengono dichiarate come costanti pubbliche su `EnrichmentApplier` (`LOW_CONFIDENCE_THRESHOLD = 60`, `HIGH_CONFIDENCE_THRESHOLD = 85`), seguendo lo stesso pattern di `ClassifyProductsBatchJob::LOW_CONFIDENCE_THRESHOLD` (già una costante di classe, non config).

  ---

  ## Test Strategy

  Feature test con `RefreshDatabase` + `RequiresDatabase` (in-memory SQLite), stesso approccio di `BrandResolverTest`/`ClassifyProductsBatchJobTest`. Nessun lavoro UI: spec puramente backend, non è richiesta strategia e2e né mockup.

  - `EnrichmentApplier`: `confidence = 90` → applica `brand_id`/`family_id`/`subfamily_id` risolti dai nomi via `TaxonomyCatalog`, `enrichment_status = 'enriched'`, `source = 'ai'`, `confidence = 90`.
  - `EnrichmentApplier`: `confidence = 70` → applica gli stessi valori AI ma `enrichment_status = 'needs_review'`.
  - `EnrichmentApplier`: `confidence = 40` → NON applica `brand_id`/`family_id`/`subfamily_id` (restano invariati/null), `enrichment_status = 'needs_review'`, e verifica che `source`/`confidence` a livello prodotto NON vengano scritti in questo caso (nessun valore AI applicato).
  - `EnrichmentApplier`: prodotto con `brand_source = 'manual'` preesistente e un `brand_id` manuale diverso da quello proposto dall'AI con `confidence = 90` → il `brand_id`/`brand_source` manuali restano invariati, ma `family_id`/`subfamily_id` (se proposti e non `manual`) vengono comunque applicati, e `enrichment_status`/`source`/`confidence` a livello prodotto vengono comunque aggiornati.
  - `EnrichmentApplier`: risultato AI con `brand` valorizzato ma non presente in tassonomia (edge case difensivo, anche se già filtrato da `ClassificationResponseValidator` a monte) → il campo non viene applicato, nessuna eccezione lanciata.
  - `TaxonomyCatalog`: test dei nuovi metodi `findBrand`/`findFamily`/`findSubfamily` — ritornano il modello corretto per name/slug case-insensitive, `null` se non trovato, e `findSubfamily` rispetta lo scoping per famiglia quando `$familyName` è fornito.
  - `ClassifyProductsBatchJob` (test di integrazione, estende la suite esistente): con `Http::fake()` che restituisce confidence >= 85 per un prodotto con brand esistente in tassonomia, verifica che al termine di `handle()` il prodotto abbia `brand_id` popolato, `enrichment_status = 'enriched'`, `source = 'ai'` — chiudendo end-to-end l'AC che finora si fermava al solo `EnrichmentLog`.
  - `ClassifyProductsBatchJob`: con confidence tra 60 e 84, verifica che il prodotto riceva comunque i valori AI ma `enrichment_status = 'needs_review'`.
  - `ClassifyProductsBatchJob`: con confidence < 60 dopo l'eventuale escalation al modello smart, verifica che il prodotto NON riceva `brand_id`/`family_id` e resti `enrichment_status = 'needs_review'`.

  ---

  _Plan generated via ARchetipo Planning — 2026-07-01_
