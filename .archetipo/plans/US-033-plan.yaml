    description: 'Nuova classe App\Filament\Pages\ProductSearch (pattern ReviewQueue/ImportCatalog): Page + HasSchemas/HasTable, InteractsWithSchemas/InteractsWithTable, navigationIcon/label/title "Ricerca prodotti", view filament.pages.product-search. Schema di ricerca: TextInput query, Select brand_id/family_id (relationship, live) e subfamily_id (opzioni filtrate per famiglia, pattern ReviewQueue::correctAction), TextInput numerici min/max per potenza_kw, diametro_nominale (DN), pressione_nominale (PN). Bottone "Cerca" che salva lo stato del form in proprietà pubbliche della pagina.'
    type: Impl
    status: DONE
    ref: TASK-01
