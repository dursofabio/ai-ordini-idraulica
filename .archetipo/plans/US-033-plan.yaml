schema: archetipo/plan/v2
spec_code: US-033
body: |
  ## Soluzione Tecnica

  ### Approccio

  US-033 aggiunge una pagina di sola consultazione nel backoffice per il motore di ricerca ibrido già implementato in `SearchService` (US-019). Nessuna modifica alla logica di ricerca: la pagina è uno strato di presentazione che raccoglie testo libero + filtri, invoca `SearchService::search()` on-demand (submit esplicito, non ricerca live-typing, per evitare chiamate ripetute al provider di embedding) e mostra i `SearchResult` in tabella.

  ### Componenti

  **1. Pagina Filament `App\Filament\Pages\ProductSearch`**

  - Pattern analogo a `ImportCatalog`/`ReviewQueue`: `Page` + `HasSchemas`/`HasTable`, `InteractsWithSchemas`/`InteractsWithTable`. Non serve `HasActions`/`InteractsWithActions`, non ci sono azioni per record.
  - Navigazione: label/titolo "Ricerca prodotti", icona coerente (es. `Heroicon::OutlinedMagnifyingGlass`).
  - Form di ricerca (schema, stato in proprietà pubblica `$data`): `TextInput::make('query')` testo libero, `Select::make('brand_id')->relationship('brand','name')`, `Select::make('family_id')->relationship('family','name')->live()`, `Select::make('subfamily_id')` con opzioni filtrate per famiglia (pattern `Get`/`options` già usato in `ReviewQueue::correctAction()`), e un set fisso di filtri per attributi tecnici numerici: `potenza_kw_min/max`, `diametro_nominale_min/max` (DN), `pressione_nominale_min/max` (PN) — le tre chiavi con estrattore deterministico già live (`AttributeResolver`, US-028).
  - Bottone "Cerca" (submit dello schema): valida e salva lo stato del form in proprietà pubbliche della pagina, poi forza il refresh della tabella (Livewire re-render sulle proprietà osservate da `records()`).

  **2. Tabella risultati via `->records()` (non Eloquent query diretta)**

  - `SearchService::search()` restituisce `Collection<SearchResult>`, non un `Builder` — per questo si usa `Table::records(fn(): Collection => ...)` (feature nativa Filament v5 per data source custom, vedi doc "Custom Data") invece di `Table::query()`.
  - Il closure `records()`: se testo vuoto E nessun filtro valorizzato → ritorna collection vuota senza chiamare `SearchService` (evita chiamate embedding a vuoto e soddisfa l'AC4 "stato vuoto guida"); altrimenti mappa i filtri del form nel formato atteso da `SearchService::search()` (`brand_id`/`family_id`/`subfamily_id`/`attributes: [{key, min, max}]`, solo le entry con almeno un bound valorizzato) e trasforma ogni `SearchResult` in un array per le colonne tabella (`title`, `brand_name`, `family_name`/`subfamily_name`, `variants_count`, `power_range` formattato "min–max kW" o "-" se assente).
  - Colonne: `TextColumn` per titolo, marca, famiglia/sottofamiglia, numero varianti, range potenza. Nessuna colonna sortable/searchable nativa: sorting/search sono delegati al motore di ricerca, coerente con la documentazione Filament sui dati custom.
  - Stato vuoto: `->emptyStateHeading()`/`->emptyStateDescription()` distinto per "nessun criterio inserito" vs "nessun risultato trovato" (derivabile da una proprietà booleana `hasSearched`).

  **3. View blade**

  - Nuovo `resources/views/filament/pages/product-search.blade.php`, pattern minimale identico a `import-catalog.blade.php`/`review-queue.blade.php` (form + tabella nello stesso `<x-filament-panels::page>`).

  ### Alternative valutate

  - **Ricerca live durante la digitazione (table `searchable()` nativo)**: scartata — ogni ricerca chiama il provider di embedding (rete + costo), la ricerca live moltiplicherebbe le chiamate ad ogni keystroke; il submit esplicito è coerente con l'uso "verifica manuale" della spec.
  - **Filtri attributo dinamici per famiglia**: scartati per esplicita decisione (set fisso), rimandabile a una spec futura se serve copertura più ampia.
  - **Nuovo endpoint API dedicato**: scartato, la pagina chiama direttamente `SearchService` (già iniettabile via container) come fa `ImportCatalog` con `ImportBatchService` — nessun giro HTTP interno necessario.

  ## Strategia di Test

  **Feature (PHPUnit + Livewire)**

  - Test `ProductSearchPageTest`: submit con solo testo → tabella mostra i prodotti-base attesi ordinati per rilevanza (fixture con `Http::fake` sull'endpoint embedding, pattern `SearchServiceFiltersTest`).
  - Submit con testo + filtro brand/famiglia/sottofamiglia → risultati ristretti coerentemente.
  - Submit con filtro attributo numerico (es. `potenza_kw` min/max) → solo i prodotti-base con varianti nel range.
  - Submit senza testo e senza filtri → nessuna chiamata a `SearchService`/endpoint embedding, tabella mostra lo stato vuoto guida.
  - Submit con filtri combinati che non producono risultati → stato vuoto "nessun risultato", distinto dal caso precedente.

  ### E2E Tests — User Simulation

  **Framework:** Laravel Dusk (già presente nel progetto, vedi `tests/Browser/ReviewQueueTriageTest.php`)
  **Artefatto visivo:** screenshot per-step (Dusk non registra video in questo progetto), salvati in `docs/test-results/US-033/`

  | Scenario | Flusso utente |
  |---|---|
  | Ricerca con esito | Login operatore → apre "Ricerca prodotti" → vede lo stato vuoto guida iniziale → inserisce testo libero + un filtro (es. famiglia) → clic "Cerca" → vede la lista dei prodotti candidati con marca/famiglia/numero varianti/range potenza |
  | Ricerca senza risultati | Login operatore → apre "Ricerca prodotti" → imposta filtri che non producono risultati → clic "Cerca" → vede il messaggio "nessun risultato" distinto dallo stato iniziale |
